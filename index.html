<script>
// ===================== APP LOGIC (CBT) =====================
(function(){
  const LETTERS=['A','B','C','D','E'];
  const EXAM_SECONDS=180*60;
  const LS='cbt_trauma_v3';
  const $=id=>document.getElementById(id);

  function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function defaultOrder(){return QUIZ.map((_,i)=>i);}
  function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
  function buildOptOrders(){const m={};QUIZ.forEach((q,i)=>{m[i]=shuffleArr(q.o.map((_,k)=>k));});return m;}

  function fresh(){return {order:shuffleArr(defaultOrder()),shuffle:true,optOrders:buildOptOrders(),answers:{},flags:{},cur:0,timeLeft:EXAM_SECONDS,started:false,finished:false};}

  function load(){try{const r=localStorage.getItem(LS);return r?JSON.parse(r):null;}catch(e){return null;}}
  let S=load()||fresh();
  if(!S.order||S.order.length!==QUIZ.length){S.order=defaultOrder();S.cur=0;}
  if(!S.answers)S.answers={}; if(!S.flags)S.flags={};
  if(!S.optOrders||typeof S.optOrders!=='object')S.optOrders={};
  if(typeof S.timeLeft!=='number')S.timeLeft=EXAM_SECONDS;

  let saveTimer=null;
  function save(){
    try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){}
    const a=$('autosave');if(a){a.classList.add('on');clearTimeout(saveTimer);saveTimer=setTimeout(()=>a.classList.remove('on'),1100);}
  }

  let tick=null;
  function runTimer(){
    if(tick)clearInterval(tick);
    if(!S.started||S.finished)return;
    tick=setInterval(()=>{
      S.timeLeft--;
      if(S.timeLeft<=0){S.timeLeft=0;renderClock();save();finishExam(true);return;}
      renderClock();
      if(S.timeLeft%5===0)save();
    },1000);
  }
  function startTimerIfNeeded(){if(S.started)return;S.started=true;save();runTimer();}
  function fmt(s){const m=Math.floor(s/60),ss=s%60;return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;}
  function renderClock(){
    const c=$('clock');if(c)c.textContent=fmt(S.timeLeft);
    const box=$('timerBox');if(box)box.classList.toggle('danger',S.started&&!S.finished&&S.timeLeft<=300);
  }

  function qidAt(pos){return S.order[pos];}
  function optOrderFor(qid){if(!S.optOrders)S.optOrders={};if(!S.optOrders[qid]||S.optOrders[qid].length!==QUIZ[qid].o.length){S.optOrders[qid]=shuffleArr(QUIZ[qid].o.map((_,k)=>k));}return S.optOrders[qid];}
  function cellClass(pos){const qid=qidAt(pos);if(S.flags[qid])return 'flagged';if(S.answers[qid]!=null)return 'answered';return 'empty';}

  function renderGrid(){
    const g=$('grid');g.innerHTML='';
    for(let i=0;i<S.order.length;i++){
      const b=document.createElement('button');
      b.className='cell '+cellClass(i)+(i===S.cur?' cur':'');
      b.textContent=i+1;
      b.onclick=()=>{S.cur=i;save();renderAll();};
      g.appendChild(b);
    }
  }

  function renderStats(){
    const answered=Object.keys(S.answers).length;
    let flagged=0;for(const k in S.flags){if(S.flags[k])flagged++;}
    $('sideStats').innerHTML='Dijawab <b>'+answered+'</b> / '+QUIZ.length+' \u2022 Ragu-ragu <b>'+flagged+'</b>';
  }

  function renderQ(){
    const qid=qidAt(S.cur);
    const q=QUIZ[qid];
    $('qno').textContent=(S.cur+1);
    const answered=S.answers[qid]!=null;
    const choice=S.answers[qid];
    const reveal=answered||S.finished;

    let h='';
    h+='<div class="q-meta"><span class="q-cat">'+escapeHtml(q.cat)+'</span><span class="q-pos">Nomor '+(S.cur+1)+' dari '+QUIZ.length+'</span></div>';
    h+='<div class="q-text">'+escapeHtml(q.q)+'</div>';
    if(q.img){h+='<div class="imgnote"><span>\ud83d\uddbc\ufe0f</span><span>'+escapeHtml(q.img)+'</span></div>';}
    h+='<div class="opts">';
    const oo=optOrderFor(qid);
    oo.forEach((orig,pos)=>{
      let cls='opt';
      if(reveal){cls+=' disabled';if(orig===q.a)cls+=' correct';else if(orig===choice)cls+=' wrong';}
      h+='<div class="'+cls+'" data-i="'+orig+'"><span class="okey">'+LETTERS[pos]+'</span><span class="otext">'+escapeHtml(q.o[orig])+'</span></div>';
    });
    h+='</div>';
    h+='<div class="explain'+(reveal?' show':'')+'">';
    h+='<div class="ex-row"><span class="lab">Kunci Jawaban</span><span class="keyans">'+LETTERS[optOrderFor(qid).indexOf(q.a)]+'. '+escapeHtml(q.o[q.a])+'</span></div>';
    h+='<div class="ex-row"><span class="lab">Level SKDI</span> <span class="skdi">'+escapeHtml(q.skdi)+'</span></div>';
    h+='<div class="ex-row"><span class="lab">Pembahasan</span><div class="pemb">'+q.p+'</div></div>';
    h+='<div class="src">Sumber soal: '+escapeHtml(q.n)+'</div>';
    h+='</div>';
    $('qhost').innerHTML=h;

    if(!reveal){
      $('qhost').querySelectorAll('.opt').forEach(o=>{o.onclick=()=>choose(qid,parseInt(o.getAttribute('data-i'),10));});
    }
    const fb=$('btnFlag');
    fb.classList.toggle('on',!!S.flags[qid]);
    fb.textContent=S.flags[qid]?'\u2691 Ditandai Ragu':'\u2691 Ragu-Ragu';
    $('btnPrev').disabled=S.cur===0;
    $('btnNext').disabled=S.cur>=S.order.length-1;
  }

  function choose(qid,i){
    if(S.finished)return;
    if(S.answers[qid]!=null)return;
    S.answers[qid]=i;
    startTimerIfNeeded();
    save();
    renderAll();
  }

  function renderAll(){
    renderQ();renderGrid();renderStats();renderClock();
    const chk=$('chkShuffle');if(chk){chk.checked=S.shuffle;chk.disabled=S.started;}
  }

  function finishExam(auto){
    S.finished=true;
    if(tick)clearInterval(tick);
    save();
    showResult(auto);
    renderAll();
  }

  function showResult(auto){
    let correct=0,answered=0;
    QUIZ.forEach((q,qid)=>{if(S.answers[qid]!=null){answered++;if(S.answers[qid]===q.a)correct++;}});
    const pct=QUIZ.length?Math.round(correct/QUIZ.length*100):0;
    const used=EXAM_SECONDS-S.timeLeft;const um=Math.floor(used/60),us=used%60;
    let h='<h2>'+(auto?'Waktu Habis \u23f0':'Ujian Selesai \u2705')+'</h2>';
    h+='<div class="res-score">'+correct+' / '+QUIZ.length+'</div>';
    h+='<div class="res-pct">Nilai '+pct+'%</div>';
    h+='<div class="res-meta">Dijawab '+answered+' soal \u2022 Benar '+correct+' \u2022 Salah '+(answered-correct)+'<br>Waktu terpakai '+um+' menit '+us+' detik</div>';
    h+='<div class="res-actions"><button id="btnReview">Tinjau Jawaban</button><button id="btnNewExam" class="danger">Mulai Ujian Baru</button></div>';
    $('modal').innerHTML=h;
    $('overlay').classList.remove('hidden');
    $('btnReview').onclick=()=>{$('overlay').classList.add('hidden');};
    $('btnNewExam').onclick=()=>resetExam();
  }

  function resetExam(){
    S=fresh();
    if(tick)clearInterval(tick);
    save();
    $('overlay').classList.add('hidden');
    renderAll();
  }

  $('btnPrev').onclick=()=>{if(S.cur>0){S.cur--;save();renderAll();}};
  $('btnNext').onclick=()=>{if(S.cur<S.order.length-1){S.cur++;save();renderAll();}};
  $('btnFlag').onclick=()=>{const qid=qidAt(S.cur);if(S.flags[qid]){delete S.flags[qid];}else{S.flags[qid]=true;}save();renderAll();};
  $('btnFinish').onclick=()=>{if(confirm('Hentikan ujian sekarang? Skor akan dihitung dan jawaban dikunci.'))finishExam(false);};
  $('btnReset').onclick=()=>{if(confirm('Reset ujian? Semua jawaban, tanda ragu, dan sisa waktu akan dihapus.'))resetExam();};
  $('chkShuffle').onchange=()=>{
    const chk=$('chkShuffle');
    if(S.started){chk.checked=S.shuffle;return;}
    S.shuffle=chk.checked;
    S.order=S.shuffle?shuffleArr(defaultOrder()):defaultOrder();
    S.cur=0;save();renderAll();
  };

  document.addEventListener('keydown',e=>{
    if(e.target&&/INPUT|TEXTAREA/.test(e.target.tagName))return;
    if(e.key==='ArrowRight')$('btnNext').click();
    if(e.key==='ArrowLeft')$('btnPrev').click();
    if(e.key.toLowerCase()==='f')$('btnFlag').click();
  });

  renderAll();
  if(S.started&&!S.finished)runTimer();
})();
</script>
</body>
