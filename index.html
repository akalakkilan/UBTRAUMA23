<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ujian Blok Trauma — CBT</title>
<style>
  :root{
    --blue:#2f6fb0; --blue2:#27598f; --blueface:#2b6cb0;
    --green:#2f9e44; --green2:#37b24d;
    --orange:#f08c00; --orange2:#f59f00;
    --gray:#ced4da; --grayd:#868e96;
    --bg:#eef1f5; --card:#ffffff; --line:#dde3ea; --txt:#1f2733; --mut:#6b7785;
    --ok:#2f9e44; --okbg:#e8f7ec; --bad:#e03131; --badbg:#fdeaea;
    --shadow:0 1px 3px rgba(20,40,70,.08),0 6px 20px rgba(20,40,70,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.55;-webkit-font-smoothing:antialiased}

  header.topbar{display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(180deg,var(--blue),var(--blue2));color:#fff;
    padding:14px 22px;box-shadow:0 2px 10px rgba(20,40,70,.18)}
  .tb-left{font-size:19px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
  .tb-mode{font-size:11px;font-weight:700;background:rgba(255,255,255,.22);padding:3px 9px;border-radius:6px;letter-spacing:1px}
  .tb-right{display:flex;align-items:center;gap:14px}
  .tb-welcome{font-size:12px;text-align:right;line-height:1.3;opacity:.95}
  .tb-welcome b{font-size:13.5px}

  .layout{max-width:1180px;margin:18px auto;padding:0 16px;display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
  @media(max-width:880px){.layout{grid-template-columns:1fr}}

  .main{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .qheader{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 18px;border-bottom:1px solid var(--line);background:#f7f9fc}
  .qh-no{font-size:14px;font-weight:800;color:var(--txt);letter-spacing:.4px}
  .qh-no span{display:inline-block;min-width:34px;text-align:center;background:var(--blueface);color:#fff;border-radius:7px;padding:3px 8px;margin-left:6px}
  .qh-right{display:flex;align-items:center;gap:10px}
  .timer{font-size:12px;font-weight:700;color:#fff;background:#495057;padding:7px 12px;border-radius:8px;letter-spacing:.5px}
  .timer span{font-variant-numeric:tabular-nums;font-size:14px;margin-left:6px}
  .timer.danger{background:var(--bad);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.6}}
  .flagbtn{border:1.5px solid var(--orange);color:var(--orange2);background:#fff;font-weight:700;font-size:12.5px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:.15s}
  .flagbtn:hover{background:#fff7ec}
  .flagbtn.on{background:var(--orange);border-color:var(--orange);color:#fff}

  .qcard{padding:22px 22px 8px}
  .q-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .q-cat{font-size:11.5px;font-weight:700;color:var(--blue);background:#eaf2fb;border:1px solid #d6e6f7;padding:4px 10px;border-radius:999px}
  .q-pos{font-size:12px;color:var(--mut)}
  .q-text{font-size:16.5px;font-weight:600;line-height:1.6;color:#16202e;margin-bottom:16px}
  .imgnote{display:flex;gap:9px;align-items:flex-start;background:#f1f4f8;border:1px dashed #c4cdd8;border-radius:10px;padding:10px 12px;margin-bottom:16px;font-size:13px;color:#52606e}

  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:flex-start;gap:12px;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;transition:.13s;background:#fff}
  .opt:hover{border-color:var(--blueface);background:#f6faff}
  .okey{flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--mut)}
  .otext{font-size:14.5px;padding-top:2px}
  .opt.disabled{cursor:default}
  .opt.disabled:hover{background:#fff;border-color:var(--line)}
  .opt.correct{border-color:var(--ok);background:var(--okbg)}
  .opt.correct .okey{background:var(--ok);border-color:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--badbg)}
  .opt.wrong .okey{background:var(--bad);border-color:var(--bad);color:#fff}

  .explain{max-height:0;overflow:hidden;opacity:0;transition:.25s;margin-top:0}
  .explain.show{max-height:4000px;opacity:1;margin-top:18px;padding:16px;background:#f7f9fc;border:1px solid var(--line);border-radius:12px}
  .ex-row{margin-bottom:10px}
  .ex-row .lab{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--mut);margin-bottom:3px}
  .keyans{display:block;font-weight:700;color:var(--ok);font-size:14.5px}
  .skdi{display:inline-block;background:#eaf2fb;color:var(--blue);font-weight:700;font-size:13px;padding:2px 9px;border-radius:6px}
  .pemb{font-size:13.7px;line-height:1.65;color:#36414f;margin-top:3px}
  .pemb b{color:#16202e}
  .src{font-size:11.5px;color:var(--mut);border-top:1px dashed var(--line);padding-top:8px;margin-top:8px;font-style:italic}

  .navrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px;border-top:1px solid var(--line);background:#f7f9fc}
  .navbtn{border:1px solid var(--line);background:#fff;color:var(--txt);font-weight:700;font-size:13px;padding:9px 16px;border-radius:9px;cursor:pointer;transition:.13s}
  .navbtn:hover:not(:disabled){border-color:var(--blueface);color:var(--blue)}
  .navbtn.primary{background:var(--blueface);border-color:var(--blueface);color:#fff}
  .navbtn.primary:hover:not(:disabled){background:var(--blue2)}
  .navbtn:disabled{opacity:.4;cursor:not-allowed}
  .autosave{font-size:11.5px;color:var(--grayd);display:flex;align-items:center;gap:5px;opacity:.55;transition:.2s}
  .autosave.on{opacity:1;color:var(--green)}

  .side{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px;position:sticky;top:16px}
  .side-h{font-size:13px;font-weight:800;letter-spacing:.5px;color:var(--txt);margin-bottom:12px}
  .side-tools{margin-bottom:12px}
  .shuffletoggle{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--mut);cursor:pointer;user-select:none}
  .shuffletoggle input{width:15px;height:15px;cursor:pointer}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;max-height:300px;overflow-y:auto;padding:3px;margin-bottom:14px}
  .cell{aspect-ratio:1/1;border:none;border-radius:7px;font-size:12.5px;font-weight:700;cursor:pointer;color:#fff;transition:.1s;display:flex;align-items:center;justify-content:center}
  .cell.empty{background:var(--gray);color:#495057}
  .cell.answered{background:var(--green2)}
  .cell.flagged{background:var(--orange2)}
  .cell.cur{outline:3px solid var(--blueface);outline-offset:1px;transform:scale(1.04)}
  .cell:hover{filter:brightness(1.08)}

  .legend{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--mut);border-top:1px solid var(--line);padding-top:12px;margin-bottom:12px}
  .legend>div{display:flex;align-items:center;gap:8px}
  .lg{width:14px;height:14px;border-radius:4px;display:inline-block}
  .lg.green{background:var(--green2)} .lg.orange{background:var(--orange2)} .lg.gray{background:var(--gray)}
  .side-stats{font-size:12.5px;color:var(--mut);background:#f7f9fc;border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:14px}
  .side-stats b{color:var(--txt)}
  .finishbtn{width:100%;background:#e03131;color:#fff;border:none;font-weight:800;font-size:13px;letter-spacing:.4px;padding:12px;border-radius:9px;cursor:pointer;transition:.13s}
  .finishbtn:hover{background:#c92a2a}
  .resetbtn{width:100%;margin-top:8px;background:#fff;color:var(--mut);border:1px solid var(--line);font-weight:700;font-size:12px;padding:8px;border-radius:9px;cursor:pointer}
  .resetbtn:hover{border-color:var(--grayd);color:var(--txt)}

  .overlay{position:fixed;inset:0;background:rgba(15,25,40,.55);display:flex;align-items:center;justify-content:center;z-index:60;padding:18px}
  .overlay.hidden{display:none}
  .modal{background:#fff;border-radius:16px;max-width:420px;width:100%;padding:28px 26px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal h2{margin:0 0 14px;font-size:21px}
  .res-score{font-size:42px;font-weight:800;color:var(--blue)}
  .res-pct{font-size:15px;font-weight:700;color:var(--green);margin-top:2px}
  .res-meta{font-size:13px;color:var(--mut);margin-top:14px;line-height:1.7}
  .res-actions{display:flex;gap:10px;margin-top:22px}
  .res-actions button{flex:1;padding:11px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--txt)}
  .res-actions button:hover{border-color:var(--blueface);color:var(--blue)}
  .res-actions button.danger{background:#e03131;border-color:#e03131;color:#fff}
  .res-actions button.danger:hover{background:#c92a2a}
</style>
</head>
<body>
<header class="topbar">
  <div class="tb-left">UJIAN BLOK TRAUMA <span class="tb-mode">CBT</span></div>
  <div class="tb-right">
    <div class="tb-welcome">Selamat datang<br><b>Peserta</b></div>
  </div>
</header>

<div class="layout">
  <main class="main">
    <div class="qheader">
      <div class="qh-no">SOAL NO. <span id="qno">1</span></div>
      <div class="qh-right">
        <button id="btnFlag" class="flagbtn">⚑ Ragu-Ragu</button>
        <div class="timer" id="timerBox">SISA WAKTU <span id="clock">180:00</span></div>
      </div>
    </div>
    <div id="qhost" class="qcard"></div>
    <div class="navrow">
      <button id="btnPrev" class="navbtn">‹ Soal Sebelumnya</button>
      <div class="autosave" id="autosave">✓ Tersimpan otomatis</div>
      <button id="btnNext" class="navbtn primary">Soal Selanjutnya ›</button>
    </div>
  </main>

  <aside class="side">
    <div class="side-h">NOMOR SOAL</div>
    <div class="side-tools">
      <label class="shuffletoggle"><input type="checkbox" id="chkShuffle"> 🔀 Acak urutan soal (sebelum mulai)</label>
    </div>
    <div id="grid" class="grid"></div>
    <div class="legend">
      <div><span class="lg green"></span> Sudah dijawab</div>
      <div><span class="lg orange"></span> Ragu-ragu</div>
      <div><span class="lg gray"></span> Belum dijawab</div>
    </div>
    <div class="side-stats" id="sideStats"></div>
    <button id="btnFinish" class="finishbtn">HENTIKAN UJIAN</button>
    <button id="btnReset" class="resetbtn">↻ Reset Ujian</button>
  </aside>
</div>

<div id="overlay" class="overlay hidden"><div class="modal" id="modal"></div></div>

<script>
const CATS = ['Semua','Anatomi & Dasar','Anatomi (Sebab-Akibat)','Kepala & Medula Spinalis','Thoraks','Syok & Resusitasi','Abdomen & Urogenital','Luka & Luka Bakar','Muskuloskeletal','Saraf Tepi','Farmakologi Trauma','Radiologi Trauma','Forensik','Psikiatri Trauma','Kegawatan, Bioetik & UU','Keislaman & Takdir','Adab Safar'];
const QUIZ = [];

// ===================== ANATOMI & DASAR =====================
QUIZ.push(
{cat:'Anatomi & Dasar',n:'Anthelix 22 no.1,26,33',q:'Di manakah letak anatomis lien yang paling tepat?',o:['Regio hipokondrium kiri, posterior diafragma, setinggi costae 9-11','Regio hipokondrium kanan, anterior diafragma, setinggi costae 9-11','Regio lateral abdomen kiri, setinggi Th12-L1','Regio epigastrium, anterior gaster, setinggi Th7-Th9','Regio lumbal kiri, retroperitoneal, setinggi L1-L3'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Lien terletak di regio hipokondrium kiri, di posterior dan inferior diafragma, terlindung costae 9-11 garis aksila. <b>Salah lainnya:</b> hipokondrium kanan adalah proyeksi hepar/kandung empedu; lateral abdomen Th12-L1 dan lumbal kiri menggambarkan letak ginjal; epigastrium adalah proyeksi gaster/pankreas. <b>Relevansi:</b> trauma tumpul hipokondrium kiri yang merobek costae 9-11 wajib dicurigai cedera lien (Kehr sign) — dokter umum mengenali kegawatan dan merujuk.'},
{cat:'Anatomi & Dasar',n:'Anthelix 22 no.3',q:'Apakah origo dari m. psoas major?',o:['Corpus, discus intervertebralis, dan processus transversus vertebrae T12-L5','Spina iliaca anterior superior','Spina iliaca posterior superior','Crista iliaca dan fossa iliaca','Lesser trochanter femoris'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> M. psoas major berorigo di sisi corpus vertebrae, discus, dan processus transversus T12-L5; insersionya di lesser trochanter. <b>Salah:</b> SIAS adalah origo m. sartorius; SIPS terkait otot punggung; crista/fossa iliaca adalah origo m. iliacus; lesser trochanter adalah insersio (bukan origo). <b>Relevansi:</b> dasar memahami psoas sign pada apendisitis.'},
{cat:'Anatomi & Dasar',n:'Trauma2 no.1,68,91',q:'Apakah insersio dari m. rectus abdominis?',o:['Processus xiphoideus dan cartilago costae 5-7','Crista iliaca','Ligamentum inguinale','Costa 8 linea medialis','Symphysis pubis dan crista pubica'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> m. rectus abdominis berinsersio di processus xiphoideus dan cartilago costae 5-7; origonya di symphysis pubis dan crista pubica. <b>Salah:</b> symphysis pubis justru origo; crista iliaca, lig. inguinale, dan costa 8 bukan tempat lekat otot ini. <b>Relevansi:</b> orientasi dinding abdomen untuk insisi dan menilai jejas seat-belt.'},
{cat:'Anatomi & Dasar',n:'Trauma2 no.38',q:'Di manakah insersio dari m. iliacus?',o:['Lesser trochanter femoris','Corpus vertebra T12','Corpus vertebra L1','Crista iliaca','Greater trochanter femoris'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> m. iliacus (bersama psoas sebagai iliopsoas) berinsersio di lesser trochanter femoris. <b>Salah:</b> corpus T12 dan L1 serta crista iliaca adalah area origo; greater trochanter adalah insersio otot gluteus dan rotator pendek. <b>Relevansi:</b> iliopsoas adalah fleksor panggul utama.'},
{cat:'Anatomi & Dasar',n:'Anthelix 22 no.5,52,62,64',q:'Saraf apakah yang berjalan melewati kanalis Guyon di pergelangan tangan?',o:['N. ulnaris','N. medianus','N. radialis','N. interosseus posterior','N. musculocutaneus'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> kanalis Guyon dilewati n. ulnaris bersama a. ulnaris; saraf ini mempersarafi otot hipotenar. <b>Salah:</b> n. medianus melewati terowongan karpal; n. radialis di kompartemen ekstensor; n. interosseus posterior cabang motorik radialis di lengan bawah; n. musculocutaneus di lengan atas. <b>Relevansi:</b> dasar diagnosis sindrom kanalis Guyon.'},
{cat:'Anatomi & Dasar',n:'Axon 20 no.8',q:'Saraf apakah yang berjalan di dalam terowongan karpal?',o:['N. medianus','N. ulnaris','N. radialis','N. musculocutaneus','N. interosseus posterior'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> n. medianus melintas terowongan karpal bersama tendon fleksor; jepitan di sini menimbulkan carpal tunnel syndrome. <b>Salah:</b> n. ulnaris lewat kanalis Guyon; n. radialis dan interosseus posterior di sisi ekstensor; n. musculocutaneus di lengan atas. <b>Relevansi:</b> CTS adalah kompetensi 3A dokter umum.'},
{cat:'Anatomi & Dasar',n:'Anthelix 22 no.64,72,95',q:'Otot-otot hipotenar dipersarafi oleh saraf?',o:['N. ulnaris','N. medianus','N. radialis','N. interosseus anterior','N. cutaneus antebrachii'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> seluruh otot hipotenar dipersarafi n. ulnaris (cabang dalam). <b>Salah:</b> n. medianus mempersarafi otot tenar (LOAF); n. radialis untuk ekstensor; sisanya tidak mempersarafi otot intrinsik hipotenar. <b>Relevansi:</b> lesi ulnaris menyebabkan claw hand.'},
{cat:'Anatomi & Dasar',n:'Anthelix 22 no.21,29,35',q:'Articulatio glenohumerale termasuk jenis sendi?',o:['Sendi peluru ball and socket','Sendi engsel hinge','Sendi pasak pivot','Sendi pelana saddle','Sendi datar plana'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> glenohumeral adalah sendi sinovial tipe peluru ball and socket sehingga paling mobile dan paling sering dislokasi. <b>Salah:</b> hinge contoh siku; pivot contoh atlanto-axial; saddle contoh karpometakarpal ibu jari; plana contoh intercarpal. <b>Relevansi:</b> dasar memahami dislokasi bahu anterior.'},
{cat:'Anatomi & Dasar',n:'Axon 20 no.4',q:'Articulatio coxae atau sendi panggul termasuk jenis sendi?',o:['Sendi peluru ball and socket','Sendi engsel hinge','Sendi pasak pivot','Sendi pelana saddle','Sendi datar plana'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> sendi panggul adalah sendi peluru ball and socket yang lebih stabil dari bahu karena acetabulum dalam. <b>Salah:</b> tipe lain seperti hinge, pivot, saddle, dan plana memiliki sumbu gerak terbatas. <b>Relevansi:</b> orientasi mekanisme dislokasi panggul posterior pada cedera dashboard.'},
{cat:'Anatomi & Dasar',n:'Trauma2 no.29',q:'Manakah pernyataan yang benar mengenai vena porta hepatis?',o:['Tersusun dari v. lienalis dan v. mesenterica superior serta mengisi sekitar empat per lima darah hepar','Tersusun dari v. mesenterica inferior dan superior','Tersusun dari v. lienalis dan v. mesenterica superior serta mengisi seperlima darah hepar','Tersusun dari v. lienalis dan v. mesenterica inferior serta mengisi seperlima darah hepar','Membawa darah keluar dari hepar menuju vena cava inferior'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> v. porta dibentuk gabungan v. lienalis dan v. mesenterica superior, menyuplai sekitar 75-80 persen (empat per lima) darah hepar. <b>Salah:</b> opsi seperlima meremehkan kontribusi porta; v. mesenterica inferior bermuara ke v. lienalis bukan langsung membentuk porta; darah keluar hepar lewat v. hepatica bukan v. porta. <b>Relevansi:</b> dasar memahami perdarahan masif pada cedera hepar.'},
{cat:'Anatomi & Dasar',n:'Trauma2 no.19',q:'Di manakah letak anatomis ginjal?',o:['Retroperitoneal, paravertebra setinggi Th12-L3','Intraperitoneal, paravertebra setinggi Th12-L3','Supraperitoneal, paravertebra setinggi Th12-L3','Retroperitoneal, prevertebra setinggi L3-L5','Intraperitoneal, prevertebra setinggi L1-L4'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> ginjal berada retroperitoneal, di sisi vertebra setinggi Th12-L3, ginjal kanan sedikit lebih rendah karena hepar. <b>Salah:</b> intraperitoneal dan supraperitoneal keliru posisi; prevertebra dan level L3-L5 tidak sesuai. <b>Relevansi:</b> cedera ginjal menimbulkan hematoma retroperitoneal, bukan tanda peritonitis dini.'},
{cat:'Anatomi & Dasar',n:'Trauma2 no.95',q:'Lapisan SCALP manakah yang bila robek membuat infeksi mudah menyebar luas?',o:['Loose connective tissue','Skin','Connective tissue padat','Galea aponeurotica','Pericranium'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> lapisan loose connective tissue (areolar) adalah danger zone karena dilalui vena emisaria yang menghubungkan ke sinus dural sehingga infeksi cepat menyebar. <b>Salah:</b> skin dan connective tissue padat justru kompak; galea adalah aponeurosis; pericranium melekat erat ke tulang membatasi penyebaran. <b>Relevansi:</b> dasar tatalaksana luka kulit kepala.'},
{cat:'Anatomi & Dasar',n:'Aorta 19 no.7',q:'Bagian tulang kepala manakah yang paling fatal bila mengalami cedera?',o:['Pterion','Vertex','Lambda','Bregma','Inion'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> pterion adalah titik tertipis kalvaria di mana a. meningea media berjalan di baliknya, sehingga fraktur di sini sering memicu epidural hematoma. <b>Salah:</b> vertex, lambda, bregma, dan inion adalah titik kraniometri tanpa pembuluh besar di baliknya. <b>Relevansi:</b> mengenali risiko EDH untuk rujukan cepat.'},
{cat:'Anatomi & Dasar',n:'Axon 20 no.70',q:'Bagian costae manakah yang paling sering mengalami fraktur?',o:['Corpus costae','Caput costae','Collum costae','Tuberculum costae','Facies articularis'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> corpus costae adalah bagian terpanjang dan paling terekspos benturan sehingga paling sering fraktur. <b>Salah:</b> caput, collum, tuberculum, dan facies articularis adalah bagian posterior yang terlindung dan jarang fraktur. <b>Relevansi:</b> fraktur costae multipel berurutan menimbulkan flail chest.'},
{cat:'Anatomi & Dasar',n:'Trauma2 no.36',q:'Penusukan tepat di superior os clavicula berisiko menembus paru pada bagian?',o:['Cupula pleurae','Ligamentum pleuralis','Otot pleura','Ligamentum parietalis','Recessus costomediastinalis'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> apex paru dan cupula pleurae menjulang sampai sekitar 2-3 cm di atas klavikula sehingga tusukan supraklavikula dapat menimbulkan pneumothorax. <b>Salah:</b> opsi lain bukan struktur anatomis yang relevan di apex. <b>Relevansi:</b> kewaspadaan iatrogenik saat pungsi vena subklavia.'},
{cat:'Anatomi & Dasar',n:'Trauma2 no.55,69',q:'Apakah peran hepar dalam metabolisme protein?',o:['Deaminasi dan transaminasi asam amino serta sintesis protein plasma','Hanya menyimpan asam amino tanpa mengubahnya','Mensekresi protein lewat empedu untuk dibuang','Memecah protein menjadi glukosa secara eksklusif','Mengubah amonia menjadi asam amino esensial'],a:0,skdi:'— (fisiologi dasar)',p:'<b>Benar:</b> hepar melakukan deaminasi dan transaminasi asam amino, mensintesis albumin dan faktor pembekuan, serta mengubah amonia menjadi urea. <b>Salah:</b> hepar tidak sekadar menyimpan; protein bukan dibuang lewat empedu; gluconeogenesis hanya sebagian fungsi; tubuh tidak mensintesis asam amino esensial. <b>Relevansi:</b> dasar memahami koagulopati pada cedera hepar berat.'}
);
</script>
<script>
// ===================== KEPALA & MEDULA SPINALIS =====================
QUIZ.push(
{cat:'Kepala & Medula Spinalis',n:'Anthelix 22 no.24,51',q:'Pada epidural hematoma, pembuluh darah manakah yang paling sering ruptur?',o:['Arteri meningea media','Vena penghubung kortikal','Arteri cerebri media','Sinus sagitalis superior','Arteri cerebri posterior'],a:0,skdi:'3B',p:'<b>Benar:</b> EDH klasik akibat robekan a. meningea media yang terkait fraktur os temporal di pterion. <b>Salah:</b> vena penghubung kortikal robek pada SDH; a. cerebri media dan posterior berada intracerebral; sinus sagitalis menimbulkan perdarahan vena lambat. <b>Relevansi:</b> dokter umum mengenali lucid interval dan merujuk segera untuk evakuasi bedah saraf.'},
{cat:'Kepala & Medula Spinalis',n:'Aorta 19 no.13',q:'Pada subdural hematoma, pembuluh darah manakah yang umumnya mengalami cedera?',o:['Vena penghubung kortikal','Arteri meningea media','Arteri cerebri anterior','Arteri carotis interna','Arteri basilaris'],a:0,skdi:'3B',p:'<b>Benar:</b> SDH terjadi akibat robekan vena penghubung kortikal yang menyilang ruang subdural, sering pada lansia dan akselerasi-deselerasi. <b>Salah:</b> a. meningea media untuk EDH; arteri-arteri besar lain bila pecah memberi gambaran perdarahan masif berbeda. <b>Relevansi:</b> kenali gambaran bulan sabit dan rujuk.'},
{cat:'Kepala & Medula Spinalis',n:'Anthelix 22 no.28',q:'Gambaran CT scan lensa bikonveks hiperdens yang tidak melewati sutura terletak di?',o:['Di antara cranium dan duramater','Di antara duramater dan arachnoid','Di antara arachnoid dan piamater','Di dalam parenkim cerebri','Di dalam ventrikel lateralis'],a:0,skdi:'3B',p:'<b>Benar:</b> EDH berada di ruang epidural antara tabula interna cranium dan duramater, berbentuk bikonveks dan terbatas garis sutura. <b>Salah:</b> subdural antara dura dan arachnoid berbentuk bulan sabit; subarachnoid antara arachnoid dan pia; sisanya intraparenkim atau intraventrikel. <b>Relevansi:</b> identifikasi pola perdarahan untuk triase rujukan.'},
{cat:'Kepala & Medula Spinalis',n:'Axon 20 no.35',q:'CT scan menunjukkan perdarahan di calvaria berbentuk bulan sabit dengan tepi cekung yang dapat melewati sutura. Jenisnya?',o:['Subdural hematoma','Epidural hematoma','Perdarahan subarachnoid','Perdarahan intraventrikel','Contusio cerebri'],a:0,skdi:'3B',p:'<b>Benar:</b> bentuk bulan sabit mengikuti permukaan otak dan dapat melewati sutura adalah ciri SDH. <b>Salah:</b> EDH bikonveks dan terbatas sutura; SAH mengisi sulkus dan sisterna; intraventrikel di sistem ventrikel; contusio adalah memar parenkim. <b>Relevansi:</b> membedakan EDH dan SDH menentukan urgensi rujukan.'},
{cat:'Kepala & Medula Spinalis',n:'Anthelix 22 no.7 / Trauma2 no.24',q:'Wanita dengan perdarahan intraserebral lobus temporal dan tanda herniasi serta peningkatan TIK. Melalui struktur manakah herniasi paling mungkin terjadi?',o:['Incisura tentorii pada tentorium cerebelli','Falx cerebri','Falx cerebelli','Foramen magnum oleh tonsil cerebelli','Basis cranii media'],a:0,skdi:'3B',p:'<b>Benar:</b> massa lobus temporal mendorong unkus melewati incisura tentorii pada tentorium cerebelli, menimbulkan herniasi unkal dengan dilatasi pupil ipsilateral. <b>Salah:</b> falx cerebri terkait herniasi subfalcine; falx cerebelli bukan jalur herniasi unkal; herniasi tonsil lewat foramen magnum terjadi pada fase lanjut difus. <b>Relevansi:</b> tanda herniasi adalah indikasi rujukan darurat.'},
{cat:'Kepala & Medula Spinalis',n:'Anthelix 22 no.27,75,98',q:'Pelajar dipukul tongkat pada kepalanya saat tawuran lalu mengalami perdarahan di dahi. Apakah mekanisme cedera yang mendasari?',o:['Akselerasi','Deselerasi','Rotasi','Kompresi statis','Penetrasi'],a:0,skdi:'3B',p:'<b>Benar:</b> objek bergerak menghantam kepala yang relatif diam menimbulkan cedera akselerasi. <b>Salah:</b> deselerasi terjadi saat kepala bergerak membentur benda diam; rotasi memicu cedera aksonal difus; kompresi statis dan penetrasi mekanisme berbeda. <b>Relevansi:</b> memahami biomekanika membantu memperkirakan pola cedera intrakranial.'},
{cat:'Kepala & Medula Spinalis',n:'Anthelix 22 no.49,78',q:'Pengendara terjatuh dan dahinya membentur trotoar yang diam. Apakah mekanisme cedera yang mendasari?',o:['Deselerasi','Akselerasi','Rotasi','Kavitasi','Avulsi'],a:0,skdi:'3B',p:'<b>Benar:</b> kepala yang bergerak lalu berhenti mendadak akibat membentur benda diam adalah cedera deselerasi. <b>Salah:</b> akselerasi adalah kebalikannya; rotasi terkait gaya angular; kavitasi dan avulsi bukan mekanisme yang tepat di sini. <b>Relevansi:</b> deselerasi sering menimbulkan lesi countercoup.'},
{cat:'Kepala & Medula Spinalis',n:'Trauma2 no.70',q:'CT menunjukkan fraktur temporal kiri namun EDH justru di sisi kanan. Apakah mekanisme yang mendasarinya?',o:['Countercoup','Coup','Akselerasi murni','Rotasi aksial','Kompresi langsung'],a:0,skdi:'3B',p:'<b>Benar:</b> lesi pada sisi berlawanan dari titik benturan disebut countercoup, akibat otak terlempar membentur tabula interna sisi seberang. <b>Salah:</b> coup adalah lesi tepat di titik benturan; akselerasi, rotasi, dan kompresi adalah mekanisme gaya, bukan lokasi lesi. <b>Relevansi:</b> memahami coup-countercoup pada interpretasi CT.'},
{cat:'Kepala & Medula Spinalis',n:'Anthelix 22 no.36,89,97',q:'Pasien trauma kepala dengan peningkatan tekanan intrakranial. Obat apa yang tepat untuk menurunkan TIK?',o:['Manitol','Furosemid tunggal','Metoclopramide','Digoksin','Prednison'],a:0,skdi:'3B',p:'<b>Benar:</b> manitol adalah diuretik osmotik lini pertama untuk menurunkan TIK akut; salin hipertonik adalah alternatif. <b>Salah:</b> furosemid hanya adjuvan; metoclopramide antiemetik; digoksin untuk jantung; prednison tidak menurunkan TIK trauma dan tidak direkomendasikan. <b>Relevansi:</b> stabilisasi awal sebelum rujukan bedah saraf.'},
{cat:'Kepala & Medula Spinalis',n:'Trauma2 no.26,82',q:'Pada cedera otak traumatik, target manajemen hemodinamik yang dianjurkan adalah?',o:['MAP minimal 70 mmHg','MAP minimal 50 mmHg','Sistolik minimal 80 mmHg','Diastolik di bawah 100 mmHg','Sistolik maksimal 120 mmHg'],a:0,skdi:'3B',p:'<b>Benar:</b> menjaga MAP sekitar 70 mmHg dan sistolik di atas 90-100 mmHg mempertahankan tekanan perfusi serebral dan mencegah cedera otak sekunder. <b>Salah:</b> MAP 50 mmHg terlalu rendah; target sistolik 80 dan batas diastolik tidak sesuai pedoman; sistolik maksimal 120 bukan target hemodinamik TBI. <b>Relevansi:</b> hindari hipotensi dan hipoksia pada pasien TBI.'},
{cat:'Kepala & Medula Spinalis',n:'Trauma2 no.89',q:'Pada persiapan operasi pasien cedera otak traumatik, prinsip manajemen koagulasi yang tepat adalah?',o:['Hb di atas 10 g/dL dan trombosit di atas 100 ribu per mikroliter','Hb 8 sampai 10 g/dL tanpa target trombosit','Trombosit di atas 50 ribu per mikroliter tanpa target Hb','Hb di atas 7 g/dL dan trombosit di atas 20 ribu per mikroliter','INR di atas 2 dipertahankan'],a:0,skdi:'3B',p:'<b>Benar:</b> untuk mencegah ekspansi perdarahan intrakranial, target koagulasi adalah Hb di atas 10 g/dL dan trombosit di atas 100 ribu. <b>Salah:</b> ambang Hb dan trombosit yang lebih rendah berlaku untuk pasien umum, bukan TBI; INR tinggi justru berbahaya. <b>Relevansi:</b> koreksi koagulopati sebelum tindakan bedah saraf.'},
{cat:'Kepala & Medula Spinalis',n:'Trauma2 no.39,86',q:'Faktor manakah yang paling memperberat diffuse axonal injury?',o:['Lesi batang otak','Epilepsi','Lesi capsula interna','Lesi medula spinalis','Perdarahan subgaleal'],a:0,skdi:'3B',p:'<b>Benar:</b> keterlibatan batang otak memperberat DAI karena mengenai pusat kesadaran dan fungsi otonom sehingga prognosis buruk. <b>Salah:</b> epilepsi adalah komplikasi lanjut; lesi capsula interna dan medula spinalis di luar mekanisme inti DAI; subgaleal adalah perdarahan ekstrakranial. <b>Relevansi:</b> DAI dicurigai bila penurunan kesadaran berat tanpa lesi massa jelas.'},
{cat:'Kepala & Medula Spinalis',n:'Trauma2 no.9 / Axon 20 no.33',q:'Pemeriksaan sederhana untuk membantu menegakkan fraktur basis cranii adalah?',o:['Tes halo','Kernig sign','Lumbal pungsi','Tes fungsi batang otak','Brudzinski sign'],a:0,skdi:'2',p:'<b>Benar:</b> tes halo menilai cincin bening di sekeliling bercak darah pada kertas, menandai kebocoran cairan serebrospinal pada fraktur basis cranii. <b>Salah:</b> Kernig dan Brudzinski untuk rangsang meningeal; lumbal pungsi kontraindikasi bila TIK tinggi; tes fungsi batang otak untuk prognosis. <b>Relevansi:</b> deteksi rinorea atau otorea LCS untuk rujukan.'},
{cat:'Kepala & Medula Spinalis',n:'Aorta 19 no.22',q:'Ekimosis bilateral periorbital atau racoon eyes menandakan cedera pada?',o:['Fraktur basis cranii fossa anterior','Fraktur basis cranii fossa posterior','Subdural hematoma','Fraktur kalvaria parietal','Fraktur os nasal isolated'],a:0,skdi:'2',p:'<b>Benar:</b> racoon eyes adalah tanda fraktur basis cranii fossa anterior; Battle sign menandai fossa posterior. <b>Salah:</b> fossa posterior memberi Battle sign retroaurikuler; SDH dan fraktur parietal tidak khas memberi racoon eyes; fraktur nasal terisolasi tidak menimbulkan ekimosis periorbital bilateral. <b>Relevansi:</b> tanda fraktur basis cranii menuntun rujukan dan kontraindikasi pipa nasogastrik.'},
{cat:'Kepala & Medula Spinalis',n:'Axon 20 no.12 / Aorta 19 no.53',q:'Regio vertebra manakah yang paling sering mengalami cedera medula spinalis?',o:['Cervical C5','Thoracal Th9','Lumbal L2','Sacral S1','Coccygeal'],a:0,skdi:'3B',p:'<b>Benar:</b> segmen servikal terutama sekitar C5 paling mobile dan paling sering cedera akibat fleksi-ekstensi mendadak. <b>Salah:</b> Th9, L2, S1, dan coccyx relatif lebih terlindung dan jarang. <b>Relevansi:</b> imobilisasi servikal dini pada semua trauma berenergi tinggi.'},
{cat:'Kepala & Medula Spinalis',n:'Axon 20 no.55 / Aorta 19 no.44',q:'Instrumen baku untuk menilai derajat gangguan motorik dan sensorik pada cedera medula spinalis adalah?',o:['ASIA score','RTS','ABCD2 score','Glasgow Outcome Scale','APACHE II'],a:0,skdi:'3B',p:'<b>Benar:</b> ASIA Impairment Scale menilai motorik, sensorik, dan menentukan komplit atau inkomplit cedera medula spinalis. <b>Salah:</b> RTS untuk triase trauma umum; ABCD2 untuk risiko stroke; GOS untuk luaran; APACHE untuk ICU. <b>Relevansi:</b> dasar komunikasi rujukan cedera spinal.'},
{cat:'Kepala & Medula Spinalis',n:'Anthelix 22 no.4,83,96',q:'Pasien jatuh terduduk saat ski, ekstremitas bawah tidak lemah, namun inkontinensia urin dan alvi dengan refleks bulbocavernosus negatif 18 jam pascatrauma. Lokasi cedera paling mungkin?',o:['S2-S3','C3-C4','T5-T6','L1-L2','C7-T1'],a:0,skdi:'3B',p:'<b>Benar:</b> gangguan kontinensia dengan refleks bulbocavernosus negatif menandai lesi segmen sakral S2-S4 atau conus medullaris, sesuai opsi S2-S3. <b>Salah:</b> C3-C4 dan C7-T1 akan menimbulkan defisit ekstremitas; T5-T6 dan L1-L2 tidak khas memberi gangguan refleks sakral terisolasi. <b>Relevansi:</b> kenali sindrom conus untuk rujukan urologi dan bedah saraf.'},
{cat:'Kepala & Medula Spinalis',n:'Aorta 19 no.54',q:'Pasien dengan kelemahan ekstremitas atas lebih berat daripada ekstremitas bawah disertai gangguan sensorik. Sindrom medula spinalis manakah ini?',o:['Central cord syndrome','Anterior cord syndrome','Posterior cord syndrome','Brown-Sequard syndrome','Cauda equina syndrome'],a:0,skdi:'3B',p:'<b>Benar:</b> central cord syndrome khas pada hiperekstensi lansia, kelemahan lengan lebih berat daripada tungkai karena serabut servikal terletak medial. <b>Salah:</b> anterior cord kehilangan motorik dan nyeri-suhu; posterior cord gangguan propriosepsi; Brown-Sequard hemiseksi; cauda equina mengenai akar lumbosakral. <b>Relevansi:</b> pengenalan pola defisit untuk rujukan.'},
{cat:'Kepala & Medula Spinalis',n:'Axon 20 no.77',q:'Foto lumbal menunjukkan VL2 bergeser ke anterior terhadap VL3. Apakah diagnosisnya?',o:['Spondylolisthesis VL2-3','Spondylitis VL2-3','Fraktur kompresi VL2-3','Spondyloarthrosis VL2-3','Spondylosis VL2-3'],a:0,skdi:'3A',p:'<b>Benar:</b> pergeseran corpus vertebra ke anterior terhadap vertebra di bawahnya adalah spondylolisthesis. <b>Salah:</b> spondylitis adalah infeksi; fraktur kompresi adalah kolaps corpus; spondyloarthrosis dan spondylosis adalah degenerasi sendi dan diskus tanpa pergeseran. <b>Relevansi:</b> interpretasi foto polos vertebra pascatrauma.'},
{cat:'Kepala & Medula Spinalis',n:'Aorta 19 no.17',q:'Pasien trauma membuka mata saat rangsang nyeri, mengerang tanpa kata, dan lengan fleksi abnormal. Berapakah skor GCS?',o:['7','8','9','10','11'],a:0,skdi:'3B',p:'<b>Benar:</b> membuka mata dengan nyeri E2, suara mengerang V2, fleksi abnormal M3 sehingga total 7. <b>Salah:</b> skor 8 sampai 11 tidak sesuai penjumlahan komponen tersebut. <b>Relevansi:</b> GCS 8 atau kurang menandakan cedera kepala berat dan indikasi proteksi jalan napas.'},
{cat:'Kepala & Medula Spinalis',n:'Axon 20 no.43',q:'Pada pasien dengan penurunan kesadaran, indikasi utama pemasangan pipa endotrakeal untuk mengamankan jalan napas adalah?',o:['GCS kurang dari 9','Fraktur humerus','Fraktur maksilofasial ringan tanpa obstruksi','Perdarahan ekstremitas','Nyeri dada non kardiak'],a:0,skdi:'3B',p:'<b>Benar:</b> GCS 8 atau kurang berarti pasien tidak mampu melindungi jalan napas sehingga diindikasikan intubasi. <b>Salah:</b> fraktur humerus dan perdarahan ekstremitas tidak langsung mengancam jalan napas; fraktur maksilofasial ringan tanpa obstruksi belum tentu butuh intubasi; nyeri dada non kardiak bukan indikasi. <b>Relevansi:</b> prioritas A pada survei primer.'},
{cat:'Kepala & Medula Spinalis',n:'Trauma2 no.50 / Anthelix 22 no.73',q:'Anak mengalami muntah berulang dan penurunan kesadaran somnolen selama belasan menit setelah jatuh. Termasuk derajat cedera kepala apa?',o:['Cedera kepala sedang','Cedera kepala ringan','Cedera kepala berat','Cedera kepala kritis','Komosio tanpa cedera kepala'],a:0,skdi:'3B',p:'<b>Benar:</b> kesadaran somnolen setara GCS 9-13 dengan muntah berulang dikategorikan cedera kepala sedang. <b>Salah:</b> ringan GCS 14-15; berat GCS 8 atau kurang; istilah kritis bukan klasifikasi baku; komosio adalah diagnosis klinis terpisah. <b>Relevansi:</b> cedera kepala sedang memerlukan observasi ketat dan pencitraan.'},
{cat:'Kepala & Medula Spinalis',n:'Aorta 19 no.14',q:'Untuk menilai fraktur kalvaria bagian occipital pada foto polos, posisi yang tepat adalah?',o:['Posisi Towne','Posisi Caldwell','Posisi Waters','Posisi true lateral','Posisi Owen'],a:0,skdi:'2',p:'<b>Benar:</b> proyeksi Towne menampilkan os occipital dan foramen magnum secara optimal. <b>Salah:</b> Caldwell untuk sinus frontal dan etmoid; Waters untuk sinus maksila dan orbita; true lateral untuk profil; Owen untuk mastoid. <b>Relevansi:</b> pemilihan proyeksi radiografi sesuai regio cedera.'}
);
</script>
<script>
// ===================== THORAKS =====================
QUIZ.push(
{cat:'Thoraks',n:'Anthelix 22 no.14,51',q:'Apakah manifestasi klinis khas flail chest?',o:['Pernapasan paradoksal pada segmen dinding dada','Deviasi trakea ke sisi kontralateral','Suara jantung yang menjauh','Hipersonor seluruh lapang paru','Emfisema subkutis luas tanpa sesak'],a:0,skdi:'3B',p:'<b>Benar:</b> flail chest akibat fraktur dua costae berurutan pada dua tempat menimbulkan segmen melayang dengan gerak paradoksal saat bernapas. <b>Salah:</b> deviasi trakea ciri tension pneumothorax; suara jantung menjauh ciri tamponade; hipersonor ciri pneumothorax; emfisema subkutis menyertai cedera lain. <b>Relevansi:</b> kontusio paru di baliknya yang sering mengancam nyawa.'},
{cat:'Thoraks',n:'Anthelix 22 no.51',q:'Tanda manakah yang paling menunjukkan tension pneumothorax dibanding flail chest?',o:['Deviasi trakea ke sisi kontralateral','Pernapasan paradoksal','Krepitasi tulang costae','Nyeri lokal saat inspirasi','Batuk darah masif'],a:0,skdi:'3B',p:'<b>Benar:</b> deviasi trakea menjauhi sisi lesi disertai distensi vena leher dan hipersonor adalah penanda tension pneumothorax. <b>Salah:</b> pernapasan paradoksal khas flail chest; krepitasi dan nyeri lokal nonspesifik; batuk darah masif mengarah cedera saluran napas atau parenkim. <b>Relevansi:</b> tension pneumothorax adalah diagnosis klinis yang butuh dekompresi segera.'},
{cat:'Thoraks',n:'Axon 20 no.73 / Aorta 19 no.51',q:'Apakah penanganan pertama pada tension pneumothorax?',o:['Needle thoracocentesis dekompresi','Pemasangan WSD definitif lebih dulu','Torakotomi darurat','Perikardiosentesis','Intubasi dan ventilasi tekanan positif'],a:0,skdi:'3B',p:'<b>Benar:</b> tindakan penyelamat segera adalah needle thoracocentesis untuk mengubah tension menjadi pneumothorax terbuka, baru dilanjutkan WSD definitif. <b>Salah:</b> WSD adalah terapi definitif berikutnya; torakotomi untuk indikasi lain; perikardiosentesis untuk tamponade; ventilasi tekanan positif justru memperberat. <b>Relevansi:</b> dekompresi jarum adalah keterampilan kegawatan dokter umum.'},
{cat:'Thoraks',n:'Trauma2 no.100 / Aorta 19 no.11',q:'Fenomena kantong kertas atau mekanisme ventil pada trauma dada menimbulkan kondisi?',o:['Tension pneumothorax','Closed pneumothorax sederhana','Hematothorax','Tamponade jantung','Open pneumothorax'],a:0,skdi:'3B',p:'<b>Benar:</b> mekanisme ventil satu arah membuat udara terus masuk pleura tanpa bisa keluar sehingga terbentuk tension pneumothorax. <b>Salah:</b> pneumothorax sederhana tanpa ventil; hematothorax adalah akumulasi darah; tamponade akumulasi cairan perikard; open pneumothorax adalah luka isap dada. <b>Relevansi:</b> patofisiologi tekanan intratoraks meningkat progresif.'},
{cat:'Thoraks',n:'Axon 20 no.30',q:'Trias Beck pada tamponade jantung terdiri atas?',o:['Hipotensi, distensi vena jugularis, dan suara jantung menjauh','Hipotensi, takikardia, dan demam','Hipertensi, bradikardia, dan deviasi trakea','Hipotermia, asidosis, dan koagulopati','Sesak, hipersonor, dan deviasi trakea'],a:0,skdi:'3B',p:'<b>Benar:</b> trias Beck klasik adalah hipotensi, distensi vena leher, dan suara jantung menjauh. <b>Salah:</b> opsi demam dan takikardia tidak spesifik; refleks Cushing berbeda; trias hipotermia asidosis koagulopati adalah lethal triad; sesak dan hipersonor adalah tension pneumothorax. <b>Relevansi:</b> mengenali tamponade untuk perikardiosentesis atau rujukan cepat.'},
{cat:'Thoraks',n:'Axon 20 no.75',q:'Pasien trauma dada dengan JVP meningkat, batas jantung melebar, suara jantung menjauh, dan perkusi sonor. Diagnosis paling tepat?',o:['Tamponade jantung','Tension pneumothorax','Hematothorax masif','Pneumothorax sederhana','Kontusio paru'],a:0,skdi:'3B',p:'<b>Benar:</b> perkusi sonor dengan suara jantung menjauh dan JVP meningkat mengarah tamponade, bukan pneumothorax. <b>Salah:</b> tension pneumothorax memberi hipersonor dan deviasi trakea; hematothorax memberi perkusi redup; pneumothorax sederhana tidak menimbulkan trias Beck; kontusio paru tidak khas. <b>Relevansi:</b> bedakan dengan tension pneumothorax dari temuan perkusi.'},
{cat:'Thoraks',n:'Anthelix 22 no.61',q:'WSD pada pasien hematothorax mengeluarkan 400 mL awal lalu sekitar 250-300 mL tiap jam berikutnya hingga diputuskan torakotomi. Klasifikasinya?',o:['Hematothorax masif','Hematothorax ringan','Hematothorax sedang','Hemopneumothorax','Efusi reaktif'],a:0,skdi:'3B',p:'<b>Benar:</b> produksi darah persisten lebih dari 200 mL per jam selama beberapa jam atau lebih dari 1500 mL awal memenuhi kriteria hematothorax masif dengan indikasi torakotomi. <b>Salah:</b> ringan dan sedang tidak mencapai ambang ini; hemopneumothorax menyertakan udara; efusi reaktif bukan trauma akut. <b>Relevansi:</b> indikasi rujukan bedah toraks.'},
{cat:'Thoraks',n:'Axon 20 no.39',q:'Bangunan anatomis yang dijadikan patokan untuk menghitung SIC saat menentukan lokasi thoracocentesis adalah?',o:['Angulus sternalis','Processus xiphoideus','Incisura jugularis','Clavicula','Arcus costae'],a:0,skdi:'3B',p:'<b>Benar:</b> angulus sternalis atau angulus Ludovici setinggi SIC 2 dipakai sebagai titik awal menghitung iga. <b>Salah:</b> processus xiphoideus, incisura jugularis, clavicula, dan arcus costae bukan patokan baku perhitungan SIC. <b>Relevansi:</b> penentuan lokasi tindakan dada yang aman.'},
{cat:'Thoraks',n:'Anthelix 22 no.93 / Axon 20 no.40',q:'Saat menusukkan jarum pada thoracocentesis, posisi yang aman terhadap costae adalah?',o:['Tepi atas costae di bawah sela iga yang dituju','Tepi bawah costae di atas sela iga yang dituju','Tepat di tengah corpus costae','Pada tuberculum costae','Pada angulus costae'],a:0,skdi:'3B',p:'<b>Benar:</b> jarum ditusukkan di tepi atas costae inferior untuk menghindari berkas neurovaskular yang berjalan di tepi bawah costae superior. <b>Salah:</b> menusuk tepi bawah costae di atas justru melukai pembuluh dan saraf interkostal; menusuk corpus, tuberculum, atau angulus tidak tepat. <b>Relevansi:</b> teknik aman pungsi pleura.'},
{cat:'Thoraks',n:'Axon 20 no.52',q:'Bila jarum ditusukkan di SIC 9 linea midaxillaris, struktur yang akan ditembus adalah?',o:['Recessus costodiaphragmaticus','Incisura cardiaca','Hilus pulmonalis','Recessus costomediastinalis','Apex pulmonis'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> di SIC 9 midaksila pleura sudah turun ke recessus costodiaphragmaticus sehingga jarum masuk ke rongga ini dan berisiko menembus diafragma. <b>Salah:</b> incisura cardiaca di kiri anterior; hilus di medial; recessus costomediastinalis di anterior parasternal; apex di atas. <b>Relevansi:</b> pemilihan SIC pada pungsi pleura untuk hindari cedera intraabdomen.'},
{cat:'Thoraks',n:'Trauma2 no.94',q:'Pasien trauma dada dengan suara bising usus terdengar di hemithorax kiri. Diagnosis paling mungkin?',o:['Ruptur diafragma','Pneumomediastinum','Pneumothorax','Hematothorax','Kontusio paru'],a:0,skdi:'3B',p:'<b>Benar:</b> bising usus di rongga dada menandakan hernia organ abdomen lewat robekan diafragma. <b>Salah:</b> pneumomediastinum memberi krepitasi mediastinum; pneumothorax memberi hipersonor; hematothorax memberi redup; kontusio paru memberi ronki. <b>Relevansi:</b> ruptur diafragma sering luput dan butuh rujukan bedah.'},
{cat:'Thoraks',n:'Aorta 19 no.6',q:'Apakah penyebab pneumomediastinum yang paling mungkin pada trauma dada?',o:['Ruptur bronkus','Fraktur costae tunggal','Robekan pleura parietalis saja','Kontusio dinding dada','Efusi pleura'],a:0,skdi:'3B',p:'<b>Benar:</b> pada trauma berenergi tinggi, ruptur saluran napas besar seperti bronkus memungkinkan udara masuk ke mediastinum. <b>Salah:</b> fraktur costae tunggal, robekan pleura parietalis saja, kontusio, dan efusi tidak khas menimbulkan udara mediastinum. <b>Relevansi:</b> kenali cedera trakeobronkial untuk rujukan segera.'},
{cat:'Thoraks',n:'Trauma2 no.100',q:'Pengemudi tanpa sabuk pengaman menabrak pohon dengan jejas kompresi setir pada dada. Bila terjadi fenomena kantong kertas, kondisi yang mungkin terjadi?',o:['Pneumothorax','Hematothorax','Flail chest','Ruptur aorta','Tamponade jantung'],a:0,skdi:'3B',p:'<b>Benar:</b> kompresi dada saat glotis tertutup meningkatkan tekanan alveoli mendadak hingga pecah dan menimbulkan pneumothorax, dikenal sebagai fenomena kantong kertas. <b>Salah:</b> hematothorax dari perdarahan; flail chest dari fraktur multipel; ruptur aorta dari deselerasi; tamponade dari cedera perikard. <b>Relevansi:</b> mekanisme paper bag effect.'}
);

// ===================== SYOK & RESUSITASI =====================
QUIZ.push(
{cat:'Syok & Resusitasi',n:'Trauma2 no.21 / Axon 20 no.20',q:'Apakah definisi syok yang paling tepat?',o:['Kegagalan sirkulasi mendistribusikan oksigen untuk memenuhi kebutuhan jaringan','Tekanan darah sistolik selalu di bawah 90 mmHg','Hilangnya kesadaran akibat cedera kepala','Penurunan curah jantung akibat aritmia semata','Peningkatan laktat tanpa gangguan perfusi'],a:0,skdi:'3B',p:'<b>Benar:</b> syok adalah kegagalan sirkulasi menghantarkan oksigen sesuai kebutuhan metabolik jaringan, sehingga terjadi hipoperfusi. <b>Salah:</b> hipotensi adalah tanda lambat bukan definisi; penurunan kesadaran dan aritmia hanya sebagian penyebab; laktat tinggi adalah penanda bukan definisi. <b>Relevansi:</b> kenali syok sebelum hipotensi muncul.'},
{cat:'Syok & Resusitasi',n:'Aorta 19 no.51',q:'Apa saja kategori utama syok?',o:['Hipovolemik, distributif, obstruktif, dan kardiogenik','Hipovolemik, septik, dan psikogenik','Distributif, neurogenik, dan vasovagal','Kardiogenik, hipovolemik, dan hipoglikemik','Obstruktif, anafilaktik, dan dehidrasi'],a:0,skdi:'3B',p:'<b>Benar:</b> empat kategori besar syok adalah hipovolemik, distributif, obstruktif, dan kardiogenik; septik, neurogenik, dan anafilaktik termasuk distributif. <b>Salah:</b> opsi lain mencampur subtipe dengan kategori atau memasukkan kondisi yang bukan kategori syok. <b>Relevansi:</b> penggolongan menentukan strategi resusitasi.'},
{cat:'Syok & Resusitasi',n:'Anthelix 22 no.12,32 / Axon 20 no.25',q:'Berapakah perkiraan kehilangan darah pada syok hemoragik kelas III menurut ATLS?',o:['1500 sampai 2000 mL','Kurang dari 750 mL','750 sampai 1500 mL','Lebih dari 2000 mL','250 sampai 500 mL'],a:0,skdi:'3B',p:'<b>Benar:</b> kelas III setara kehilangan 30-40 persen volume darah atau sekitar 1500-2000 mL dengan takikardia, takipnea, dan hipotensi. <b>Salah:</b> kurang dari 750 mL kelas I; 750-1500 mL kelas II; lebih dari 2000 mL kelas IV; 250-500 mL tidak signifikan. <b>Relevansi:</b> kelas III dan IV membutuhkan transfusi.'},
{cat:'Syok & Resusitasi',n:'Trauma2 no.25',q:'Perdarahan kelas II menurut ATLS ditandai dengan?',o:['Kehilangan 15 sampai 30 persen volume darah sekitar 750 sampai 1500 mL','Kehilangan lebih dari 40 persen volume darah','Kehilangan kurang dari 15 persen volume darah','Kehilangan 30 sampai 40 persen volume darah','Kehilangan lebih dari 50 persen volume darah'],a:0,skdi:'3B',p:'<b>Benar:</b> kelas II adalah kehilangan 15-30 persen atau sekitar 750-1500 mL dengan takikardia dan tekanan nadi menyempit, tekanan sistolik sering masih normal. <b>Salah:</b> nilai lebih besar adalah kelas III dan IV; kurang dari 15 persen kelas I. <b>Relevansi:</b> deteksi dini lewat tekanan nadi yang menyempit.'},
{cat:'Syok & Resusitasi',n:'Trauma2 no.31',q:'Perubahan klinis manakah yang menandai gejala awal syok hipovolemik?',o:['Peningkatan tekanan diastolik dengan tekanan nadi yang menyempit','Penurunan tekanan diastolik dengan tekanan nadi melebar','Bradikardia dengan hipotensi berat','Sistolik meningkat dengan nadi melambat','Hipertensi disertai bradipnea'],a:0,skdi:'3B',p:'<b>Benar:</b> kompensasi dini berupa vasokonstriksi meningkatkan tekanan diastolik sehingga tekanan nadi menyempit, dengan takikardia. <b>Salah:</b> tekanan nadi melebar dan bradikardia adalah tanda lanjut atau syok lain; sistolik meningkat dengan nadi melambat tidak sesuai; hipertensi bradipnea bukan syok. <b>Relevansi:</b> tekanan nadi menyempit adalah alarm dini.'},
{cat:'Syok & Resusitasi',n:'Anthelix 22 no.50,55,60 / Axon 20 no.69',q:'Manakah yang menjadi prinsip dasar resusitasi pada syok perdarahan?',o:['Manajemen hemodinamik dan manajemen koagulasi','Manajemen koagulasi dan manajemen kesadaran','Manajemen perdarahan dan manajemen airway','Manajemen airway dan manajemen nyeri','Manajemen cairan dan manajemen suhu saja'],a:0,skdi:'3B',p:'<b>Benar:</b> prinsip resusitasi syok perdarahan adalah mengendalikan hemodinamik sekaligus koagulasi untuk mencegah lethal triad. <b>Salah:</b> opsi lain menggabungkan komponen yang tidak menjadi pilar utama resusitasi perdarahan. <b>Relevansi:</b> dasar damage control resuscitation.'},
{cat:'Syok & Resusitasi',n:'Aorta 19 no.5',q:'Trias kematian atau lethal triad yang menjadi target pencegahan pada resusitasi trauma adalah?',o:['Koagulopati, hipotermia, dan asidosis','Hipotermia, hipovolemia, dan asidosis','Koagulopati, hipoalbumin, dan alkalosis','Hipertermia, asidosis, dan koagulopati','Hipoalbumin, alkalosis, dan hiperemesis'],a:0,skdi:'3B',p:'<b>Benar:</b> lethal triad adalah koagulopati, hipotermia, dan asidosis yang saling memperberat dan meningkatkan mortalitas. <b>Salah:</b> kombinasi lain memasukkan istilah yang bukan komponen trias kematian. <b>Relevansi:</b> cegah hipotermia dan asidosis selama resusitasi.'},
{cat:'Syok & Resusitasi',n:'Axon 20 no.3,76 / Aorta 19 no.19',q:'Laki-laki dengan RR 40, TD 70/40, nadi 130, jejas luas hipokondrium kiri. Tindakan pertama mengatasi syok?',o:['Pasang IV line kanula terbesar dan guyur cairan kristaloid','Berikan obat vasopresor segera','Berikan obat penghenti perdarahan oral','Hangatkan pasien terlebih dahulu','Berikan oksigen tanpa akses vena'],a:0,skdi:'3B',p:'<b>Benar:</b> langkah pertama syok hemoragik adalah memasang dua jalur intravena kanula besar dan resusitasi cairan kristaloid hangat sambil mengendalikan sumber perdarahan. <b>Salah:</b> vasopresor bukan lini pertama tanpa volume; obat oral tidak adekuat; menghangatkan penting namun bukan tindakan pertama; oksigen saja tidak cukup tanpa akses vena. <b>Relevansi:</b> resusitasi cairan adalah keterampilan kegawatan dokter umum.'},
{cat:'Syok & Resusitasi',n:'Anthelix 22 no.71 / Aorta 19 no.37',q:'Jenis cairan apakah yang menjadi pilihan awal resusitasi pada syok hipovolemik?',o:['Cairan kristaloid isotonis','Cairan dekstrosa 5 persen','Cairan koloid hipertonik','Larutan albumin pekat','Cairan hipotonis'],a:0,skdi:'3B',p:'<b>Benar:</b> kristaloid isotonis hangat seperti ringer laktat atau salin normal adalah lini pertama resusitasi syok hipovolemik. <b>Salah:</b> dekstrosa cepat keluar ke intrasel; koloid bukan lini pertama rutin; albumin pekat dan cairan hipotonis tidak sesuai resusitasi awal. <b>Relevansi:</b> protokol ATLS.'},
{cat:'Syok & Resusitasi',n:'Anthelix 22 no.67',q:'Pasien membaik setelah loading cairan namun beberapa saat kemudian kembali hipotensi dan takikardia. Respon terapi cairan ini disebut?',o:['Transient responder','No responder','Rapid responder','Minimal responder','Late responder'],a:0,skdi:'3B',p:'<b>Benar:</b> perbaikan sementara yang diikuti perburukan menandakan transient responder, indikasi perdarahan berlanjut yang butuh transfusi dan kontrol sumber. <b>Salah:</b> no responder tidak membaik sama sekali; rapid responder tetap stabil; minimal dan late responder bukan klasifikasi baku ATLS. <b>Relevansi:</b> transient responder perlu rujukan bedah cepat.'},
{cat:'Syok & Resusitasi',n:'Trauma2 no.76',q:'Parameter manakah yang paling baik untuk menilai keberhasilan resusitasi cairan?',o:['Balans cairan melalui produksi urin','Laju napas','Kadar elektrolit serum','Tekanan darah tunggal','Suhu aksila'],a:0,skdi:'3B',p:'<b>Benar:</b> produksi urin sekitar 0,5 mL per kg per jam pada dewasa mencerminkan perfusi ginjal dan menjadi penanda keberhasilan resusitasi. <b>Salah:</b> laju napas, elektrolit, tekanan darah tunggal, dan suhu kurang sensitif menilai perfusi end organ. <b>Relevansi:</b> pasang kateter urin untuk monitoring resusitasi.'},
{cat:'Syok & Resusitasi',n:'Axon 20 no.5',q:'Jenis syok yang ditandai vasodilatasi perifer dan bronkokonstriksi adalah?',o:['Syok anafilaktik','Syok hipovolemik','Syok kardiogenik','Syok obstruktif','Syok neurogenik'],a:0,skdi:'3B',p:'<b>Benar:</b> kombinasi vasodilatasi sistemik dan bronkokonstriksi khas reaksi anafilaktik yang termasuk syok distributif. <b>Salah:</b> hipovolemik akibat kehilangan volume; kardiogenik akibat gagal pompa; obstruktif akibat hambatan aliran; neurogenik tanpa bronkokonstriksi. <b>Relevansi:</b> adrenalin intramuskular adalah terapi utama anafilaksis.'},
{cat:'Syok & Resusitasi',n:'Aorta 19 no.36',q:'Jenis syok yang paling sering ditemukan pada pasien di rumah sakit secara umum adalah?',o:['Syok hipovolemik','Syok kardiogenik','Syok anafilaktik','Syok neurogenik','Syok obstruktif'],a:0,skdi:'3B',p:'<b>Benar:</b> syok hipovolemik adalah jenis syok tersering, terutama pada konteks trauma dan kehilangan cairan. <b>Salah:</b> kardiogenik, anafilaktik, neurogenik, dan obstruktif lebih jarang dibanding hipovolemik. <b>Relevansi:</b> kewaspadaan tinggi terhadap perdarahan tersembunyi.'},
{cat:'Syok & Resusitasi',n:'Axon 20 no.65 / Aorta 19 no.15',q:'Fraktur pelvis dengan hematoma retroperitoneal luas. Sumber perdarahan tersering adalah?',o:['Ruptur pleksus venosus pelvis','Ruptur arteri femoralis','Ruptur arteri renalis','Ruptur vena cava inferior','Ruptur arteri carotis'],a:0,skdi:'3B',p:'<b>Benar:</b> sebagian besar perdarahan pada fraktur pelvis berasal dari pleksus venosus pelvis dan permukaan tulang cancellous. <b>Salah:</b> arteri femoralis, renalis, vena cava, dan carotis tidak khas menjadi sumber utama hematoma retroperitoneal pelvis. <b>Relevansi:</b> pelvic binding sebagai kontrol perdarahan awal.'}
);
</script>
<script>
// ===================== MUSKULOSKELETAL =====================
QUIZ.push(
{cat:'Muskuloskeletal',n:'Anthelix 22 no.6,57,87,88',q:'Pasien dengan fraktur humerus sepertiga distal tidak dapat melakukan satu gerakan. Gerakan apakah yang terganggu?',o:['Ekstensi ibu jari','Fleksi ibu jari','Fleksi jari-jari','Oposisi ibu jari','Abduksi jari kelingking'],a:0,skdi:'3B',p:'<b>Benar:</b> fraktur humerus distal mencederai n. radialis sehingga terjadi wrist drop dan ketidakmampuan ekstensi pergelangan serta ibu jari. <b>Salah:</b> fleksi jari dan ibu jari dipersarafi medianus dan ulnaris; oposisi ibu jari oleh medianus; abduksi kelingking oleh ulnaris. <b>Relevansi:</b> periksa fungsi n. radialis pada setiap fraktur humerus.'},
{cat:'Muskuloskeletal',n:'Trauma2 no.13,96',q:'Pasien jatuh bertumpu pada telapak tangan lalu pergelangan tangan tampak seperti garpu makan atau dinner fork deformity. Diagnosisnya?',o:['Fraktur Colles','Fraktur Smith','Fraktur Galeazzi','Fraktur Monteggia','Fraktur scaphoid'],a:0,skdi:'3B',p:'<b>Benar:</b> fraktur Colles adalah fraktur radius distal dengan angulasi dorsal yang memberi gambaran dinner fork. <b>Salah:</b> Smith angulasi volar atau garden spade; Galeazzi fraktur radius dengan dislokasi radioulnar distal; Monteggia fraktur ulna dengan dislokasi caput radii; scaphoid nyeri snuffbox tanpa deformitas garpu. <b>Relevansi:</b> diagnosis klinis dan radiologis fraktur lengan bawah.'},
{cat:'Muskuloskeletal',n:'Aorta 19 no.27',q:'Manakah yang termasuk tanda pasti fraktur?',o:['Deformitas dan krepitasi','Nyeri tekan lokal','Pembengkakan jaringan','Hematoma subkutan','Keterbatasan gerak akibat nyeri'],a:0,skdi:'3B',p:'<b>Benar:</b> tanda pasti fraktur meliputi deformitas, krepitasi, gerakan abnormal, dan diskontinuitas tulang pada radiografi. <b>Salah:</b> nyeri tekan, bengkak, hematoma, dan keterbatasan gerak adalah tanda tidak pasti yang juga muncul pada cedera jaringan lunak. <b>Relevansi:</b> membedakan tanda pasti dan tidak pasti untuk diagnosis awal.'},
{cat:'Muskuloskeletal',n:'Axon 20 no.19',q:'Anak dengan fraktur antebrachii tertutup angulasi tanpa cedera neurovaskular. Tatalaksana awal yang tepat adalah?',o:['Reduksi tertutup dan imobilisasi gips sirkuler','Reduksi terbuka dan fiksasi internal segera','Pemasangan traksi skeletal','Amputasi profilaksis','Eksisi fragmen tulang'],a:0,skdi:'3B',p:'<b>Benar:</b> fraktur tertutup anak dengan periosteum tebal umumnya berhasil dengan reduksi tertutup dan imobilisasi gips karena potensi remodeling besar. <b>Salah:</b> ORIF untuk fraktur tidak stabil atau gagal reduksi; traksi skeletal jarang untuk antebrachii anak; amputasi dan eksisi fragmen tidak diindikasikan. <b>Relevansi:</b> prinsip penanganan fraktur anak dan kapan merujuk.'},
{cat:'Muskuloskeletal',n:'Anthelix 22 no.77',q:'Nyeri pada sisi lateral siku yang memberat saat ekstensi pergelangan tangan menunjukkan peradangan pada?',o:['Epicondylus lateralis humeri','Epicondylus medialis humeri','Olecranon ulna','Caput radii','Processus coronoideus'],a:0,skdi:'3A',p:'<b>Benar:</b> tennis elbow atau epikondilitis lateralis adalah peradangan tendon ekstensor pada epicondylus lateralis humeri. <b>Salah:</b> epicondylus medialis adalah golfer elbow; olecranon, caput radii, dan processus coronoideus bukan lokasi nyeri epikondilitis lateral. <b>Relevansi:</b> diagnosis nyeri siku di layanan primer.'},
{cat:'Muskuloskeletal',n:'Axon 20 no.13',q:'Pemeriksaan untuk membantu menegakkan carpal tunnel syndrome dengan mengetuk di atas n. medianus adalah?',o:['Tes Tinel','Tes Lasegue','Tes Thompson','Tes McMurray','Tes Allen'],a:0,skdi:'3A',p:'<b>Benar:</b> tes Tinel memunculkan kesemutan di distribusi medianus saat mengetuk pergelangan tangan, mendukung diagnosis CTS bersama tes Phalen. <b>Salah:</b> Lasegue untuk iskialgia; Thompson untuk ruptur tendon Achilles; McMurray untuk meniskus; Allen untuk patensi arteri tangan. <b>Relevansi:</b> CTS adalah kompetensi 3A dokter umum.'}
);

// ===================== FARMAKOLOGI TRAUMA =====================
QUIZ.push(
{cat:'Farmakologi Trauma',n:'Anthelix 22 no.2,8,47 / Axon 20 no.1,38',q:'Bagaimana mekanisme kerja utama asam traneksamat sebagai antiperdarahan?',o:['Menghambat secara kompetitif aktivasi plasminogen menjadi plasmin','Meningkatkan adhesi trombosit ke endotel','Memperbaiki resistensi dinding kapiler','Menggantikan faktor VIII yang kurang','Mengaktifkan vitamin K dependen faktor pembekuan'],a:0,skdi:'— (farmakologi)',p:'<b>Benar:</b> asam traneksamat adalah antifibrinolitik yang menghambat kompetitif pengikatan plasminogen sehingga fibrinolisis berkurang. <b>Salah:</b> adhesi trombosit adalah kerja ethamsylate; perbaikan kapiler adalah carbazochrome; faktor VIII untuk hemofilia A; vitamin K untuk faktor II VII IX X. <b>Relevansi:</b> traneksamat dini menurunkan mortalitas perdarahan trauma per studi CRASH-2.'},
{cat:'Farmakologi Trauma',n:'Anthelix 22 no.23,48 / Aorta 19 no.34',q:'Obat hemostatik yang bekerja meningkatkan adhesi trombosit dan memperbaiki resistensi kapiler adalah?',o:['Ethamsylate','Asam traneksamat','Carbazochrome','Vitamin K','Asam aminokaproat'],a:0,skdi:'— (farmakologi)',p:'<b>Benar:</b> ethamsylate meningkatkan adhesi trombosit dan stabilitas kapiler sehingga mengurangi perdarahan kapiler. <b>Salah:</b> asam traneksamat dan aminokaproat adalah antifibrinolitik; carbazochrome menurunkan permeabilitas kapiler; vitamin K untuk sintesis faktor pembekuan. <b>Relevansi:</b> mengenal profil hemostatik berbeda untuk indikasi tepat.'},
{cat:'Farmakologi Trauma',n:'Anthelix 22 no.47 / Trauma2 no.90',q:'Obat hemostatik yang bekerja menurunkan permeabilitas kapiler dan memperpendek waktu perdarahan adalah?',o:['Carbazochrome','Asam traneksamat','Ethamsylate','Faktor VIII rekombinan','Protamin sulfat'],a:0,skdi:'— (farmakologi)',p:'<b>Benar:</b> carbazochrome bekerja menstabilkan dan menurunkan permeabilitas kapiler sehingga memperpendek waktu perdarahan. <b>Salah:</b> asam traneksamat antifibrinolitik; ethamsylate meningkatkan adhesi trombosit; faktor VIII untuk hemofilia A; protamin menetralkan heparin. <b>Relevansi:</b> pilihan hemostatik pada perdarahan kapiler ringan.'},
{cat:'Farmakologi Trauma',n:'Anthelix 22 no.22 / Trauma2 no.16',q:'Pasien laki-laki dengan riwayat perdarahan sendi berulang dan diduga hemofilia A. Faktor pembekuan yang mengalami defisiensi adalah?',o:['Faktor VIII','Faktor IX','Faktor VII','Faktor XI','Faktor von Willebrand saja'],a:0,skdi:'3A',p:'<b>Benar:</b> hemofilia A adalah defisiensi faktor VIII dengan ciri hemartrosis berulang. <b>Salah:</b> faktor IX adalah hemofilia B; faktor VII dan XI menyebabkan gangguan lain; defisiensi von Willebrand adalah penyakit terpisah dengan pola perdarahan mukokutan. <b>Relevansi:</b> kenali gangguan koagulasi herediter untuk rujukan hematologi.'},
{cat:'Farmakologi Trauma',n:'Trauma2 no.7',q:'Pasien dengan luka robek 7 cm sudah dijahit, tanpa tanda infeksi sistemik. Terapi farmakologis yang paling sesuai adalah?',o:['Analgetik NSAID dan antibiotik profilaksis sesuai indikasi','Kortikosteroid sistemik dosis tinggi','Antikoagulan oral','Antifibrinolitik intravena jangka panjang','Vasopresor oral'],a:0,skdi:'4A',p:'<b>Benar:</b> luka jahit nyeri tanpa kontraindikasi diberi analgetik NSAID dan antibiotik sesuai derajat kontaminasi serta status tetanus. <b>Salah:</b> kortikosteroid menghambat penyembuhan; antikoagulan meningkatkan perdarahan; antifibrinolitik jangka panjang tidak diindikasikan; vasopresor oral tidak relevan. <b>Relevansi:</b> manajemen pascahecting di layanan primer.'},
{cat:'Farmakologi Trauma',n:'Anthelix 22 no.36',q:'Pada pasien cedera kepala dengan tanda peningkatan tekanan intrakranial, obat osmotik pilihan untuk menurunkan TIK adalah?',o:['Manitol','Deksametason','Nimodipin','Fenitoin','Asam traneksamat'],a:0,skdi:'3B',p:'<b>Benar:</b> manitol adalah diuretik osmotik yang menarik cairan dari otak sehingga menurunkan TIK akut. <b>Salah:</b> deksametason untuk edema tumor bukan trauma; nimodipin untuk vasospasme SAH; fenitoin untuk profilaksis kejang; asam traneksamat antiperdarahan. <b>Relevansi:</b> stabilisasi sebelum rujukan bedah saraf.'}
);

// ===================== FORENSIK =====================
QUIZ.push(
{cat:'Forensik',n:'Trauma2 no.10 / Axon 20 no.48',q:'Pada korban asfiksia, keluarnya feses, urin, dan air mani terjadi pada fase?',o:['Fase konvulsi','Fase dispnea','Fase apnea','Fase terminal','Fase pemulihan'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> pelepasan sfingter sehingga keluar feses dan urin terjadi pada fase konvulsi akibat kejang otot generalisata. <b>Salah:</b> dispnea adalah fase awal sesak; apnea berhenti napas; terminal menjelang henti; pemulihan tidak ada pada asfiksia fatal. <b>Relevansi:</b> interpretasi tanda asfiksia pada pemeriksaan forensik.'},
{cat:'Forensik',n:'Anthelix 22 no.46',q:'Urutan fase patofisiologi asfiksia yang benar adalah?',o:['Dispnea, konvulsi, apnea, lalu terminal','Konvulsi, dispnea, apnea, lalu terminal','Apnea, dispnea, konvulsi, lalu terminal','Dispnea, apnea, konvulsi, lalu terminal','Terminal, konvulsi, apnea, lalu dispnea'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> fase asfiksia berurutan dimulai dispnea, lalu konvulsi, kemudian apnea, dan berakhir fase terminal. <b>Salah:</b> urutan lain tidak sesuai progresi hipoksia dan hiperkapnia. <b>Relevansi:</b> dasar memahami tanatologi asfiksia.'},
{cat:'Forensik',n:'Anthelix 22 no.81',q:'Pada awal kejadian asfiksia akibat tercekik, udara tidak langsung keluar dari saluran napas karena?',o:['Laringospasme menutup jalan napas','Paru sudah kolaps total','Diafragma lumpuh permanen','Trakea terisi penuh cairan','Bronkus mengalami kalsifikasi'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> spasme laring refleks menutup jalan napas sehingga udara tertahan pada awal asfiksia. <b>Salah:</b> kolaps paru total, kelumpuhan diafragma permanen, trakea penuh cairan, dan kalsifikasi bronkus bukan mekanisme awal yang tepat. <b>Relevansi:</b> menjelaskan temuan paru pada korban asfiksia.'},
{cat:'Forensik',n:'Trauma2 no.2,103',q:'Pada korban tenggelam, kerusakan utama yang terjadi di paru adalah?',o:['Edema pulmonum','Fibrosis paru kronik','Emfisema bulosa','Atelektasis kongenital','Pneumokoniosis'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> masuknya air mengganggu surfaktan dan membran alveolokapiler sehingga terjadi edema pulmonum. <b>Salah:</b> fibrosis kronik, emfisema bulosa, atelektasis kongenital, dan pneumokoniosis adalah proses kronik yang tidak terjadi akut akibat tenggelam. <b>Relevansi:</b> dasar interpretasi temuan otopsi tenggelam.'},
{cat:'Forensik',n:'Trauma2 no.15,72 / Axon 20 no.60',q:'Jenazah ditemukan dengan luka kekuningan di telapak tangan dan luka kehitaman di telapak kaki. Penyebab kematian paling mungkin?',o:['Tersengat arus listrik','Tersambar petir','Terpapar bahan kimia asam','Terbakar api langsung','Terpapar air panas'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> luka masuk arus pada tangan dan luka keluar pada kaki adalah pola khas sengatan arus listrik dengan electric mark. <b>Salah:</b> petir memberi gambaran arborescent; asam memberi luka perkamen; api memberi luka bakar termal; air panas memberi luka basah tanpa pola masuk keluar. <b>Relevansi:</b> identifikasi jenis trauma fisika pada forensik.'},
{cat:'Forensik',n:'Axon 20 no.24 / Aorta 19 no.9',q:'Jenazah ditemukan setelah badai dengan gambaran kulit menyerupai cabang pohon atau arborescent mark. Penyebab kematian paling mungkin?',o:['Tersambar petir','Tersengat arus listrik rumah tangga','Terpapar basa kuat','Terbakar bensin','Tenggelam air tawar'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> gambaran arborescent atau Lichtenberg figure adalah tanda khas sambaran petir. <b>Salah:</b> arus listrik rumah tangga memberi electric mark fokal; basa kuat memberi luka licin saponifikasi; terbakar bensin memberi luka termal; tenggelam tidak memberi pola kulit cabang pohon. <b>Relevansi:</b> membedakan trauma listrik dan petir.'},
{cat:'Forensik',n:'Trauma2 no.105 / Axon 20 no.74',q:'Arus listrik dengan kuat sekitar 75 sampai 100 mA yang melewati jantung paling berbahaya karena memicu?',o:['Fibrilasi ventrikel','Blok atrioventrikular total','Sinus bradikardia','Atrial flutter','Asistol langsung tanpa aritmia'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> arus pada rentang ini paling sering memicu fibrilasi ventrikel yang fatal. <b>Salah:</b> blok AV total, sinus bradikardia, dan atrial flutter bukan akibat tersering; asistol langsung lebih khas pada arus sangat tinggi. <b>Relevansi:</b> dasar penanganan henti jantung akibat sengatan listrik.'},
{cat:'Forensik',n:'Axon 20 no.31 / Aorta 19 no.2',q:'Korban terkena cairan dengan bekas luka licin, berbau seperti sabun, dan jaringan tampak mencair. Bahan kimia penyebabnya bersifat?',o:['Basa kuat','Asam kuat','Netral isotonis','Asam lemah','Pelarut organik'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> basa kuat menimbulkan nekrosis likuefaktif dengan saponifikasi lemak sehingga luka terasa licin dan berbau sabun. <b>Salah:</b> asam kuat memberi nekrosis koagulatif kering seperti perkamen; netral, asam lemah, dan pelarut organik tidak memberi gambaran ini. <b>Relevansi:</b> membedakan luka kimia asam dan basa.'},
{cat:'Forensik',n:'Axon 20 no.31 / Aorta 19 no.33',q:'Korban terpapar cairan dengan bekas luka kering, keras, kecoklatan, dan menyerupai perkamen. Bahan kimia penyebabnya bersifat?',o:['Asam kuat','Basa kuat','Garam fisiologis','Air panas','Minyak nabati'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> asam kuat menimbulkan nekrosis koagulatif yang membentuk luka kering keras menyerupai perkamen. <b>Salah:</b> basa kuat memberi luka licin saponifikasi; garam fisiologis, air panas, dan minyak nabati tidak korosif demikian. <b>Relevansi:</b> identifikasi agen kimia dari morfologi luka.'},
{cat:'Forensik',n:'Aorta 19 no.58 / Axon 20 no.40',q:'Jenazah korban kebakaran ditemukan dengan posisi seperti petinju atau pugilistic attitude. Hal ini disebabkan oleh?',o:['Koagulasi panas pada otot fleksor','Kekakuan akibat tenggelam','Pembusukan lanjut','Pengeluaran energi sebelum mati','Trauma tumpul masif'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> panas mengoagulasi dan memendekkan otot fleksor yang lebih kuat sehingga jenazah membentuk sikap petinju, ini adalah perubahan pascamati bukan tanda intravital. <b>Salah:</b> tenggelam, pembusukan, aktivitas sebelum mati, dan trauma tumpul tidak menimbulkan pugilistic attitude. <b>Relevansi:</b> interpretasi temuan pada korban terbakar.'},
{cat:'Forensik',n:'Trauma2 no.59',q:'Pada korban gantung diri yang lama tergantung, lebam mayat paling banyak ditemukan di?',o:['Bagian distal tubuh seperti tungkai, tangan, dan genitalia','Bagian punggung','Bagian wajah dan leher','Bagian dada anterior','Bagian bokong'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> pada posisi tergantung tegak, gravitasi mengumpulkan darah di bagian distal yaitu tungkai bawah, tangan, dan genitalia eksterna. <b>Salah:</b> punggung dan bokong adalah lebam pada posisi terlentang; wajah, leher, dan dada anterior tidak sesuai posisi tergantung. <b>Relevansi:</b> distribusi lebam membantu memperkirakan posisi saat kematian.'},
{cat:'Forensik',n:'Axon 20 no.41',q:'Jenazah penderita leukemia yang menjalani kemoterapi ditemukan meninggal tanpa tanda kekerasan dan tanpa riwayat trauma. Jenis asfiksia yang paling mungkin adalah?',o:['Asfiksia akibat penyakit','Asfiksia akibat pembekapan','Asfiksia akibat penjeratan','Asfiksia akibat penyumbatan benda asing','Asfiksia akibat tenggelam'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> tanpa tanda kekerasan, asfiksia pada pasien dengan penyakit berat seperti infeksi paru atau perdarahan tergolong asfiksia akibat penyakit alamiah. <b>Salah:</b> pembekapan, penjeratan, benda asing, dan tenggelam menimbulkan tanda kekerasan atau riwayat spesifik yang tidak ada di sini. <b>Relevansi:</b> membedakan kematian wajar dan tidak wajar.'}
);
</script>
<script>
// ===================== PSIKIATRI TRAUMA =====================
QUIZ.push(
{cat:'Psikiatri Trauma',n:'Anthelix 22 no.20,37,42',q:'Pasien beberapa hari setelah kecelakaan tampak linglung, merasa terpisah dari lingkungan, dan sulit mengingat sebagian kejadian. Gejala dominan ini adalah?',o:['Gejala disosiasi','Halusinasi auditorik','Waham kebesaran','Mania','Obsesi kompulsi'],a:0,skdi:'3A',p:'<b>Benar:</b> gejala disosiasi seperti depersonalisasi, derealisasi, dan amnesia menonjol pada gangguan stres akut yang muncul dalam satu bulan pascatrauma. <b>Salah:</b> halusinasi dan waham adalah ciri psikotik; mania ciri bipolar; obsesi kompulsi ciri OCD. <b>Relevansi:</b> kenali gangguan stres akut untuk tata laksana awal dan rujukan.'},
{cat:'Psikiatri Trauma',n:'Anthelix 22 no.92 / Trauma2 no.34 / Axon 20 no.50',q:'Pasien lima minggu pascatrauma mengalami mimpi buruk berulang, kilas balik, dan menghindari lokasi kejadian. Diagnosis paling tepat?',o:['Gangguan stres pascatrauma','Gangguan stres akut','Gangguan penyesuaian','Gangguan panik','Gangguan cemas menyeluruh'],a:0,skdi:'3A',p:'<b>Benar:</b> gejala flashback, mimpi buruk, dan avoidance yang menetap lebih dari satu bulan memenuhi kriteria PTSD. <b>Salah:</b> gangguan stres akut berlangsung kurang dari satu bulan; gangguan penyesuaian tanpa kriteria reexperiencing khas; panik dan cemas menyeluruh tidak terikat trauma spesifik. <b>Relevansi:</b> bedakan PTSD dan gangguan stres akut berdasarkan durasi.'},
{cat:'Psikiatri Trauma',n:'Anthelix 22 no.92',q:'Terapi lini pertama berbasis psikoterapi untuk gangguan stres pascatrauma adalah?',o:['Terapi perilaku kognitif berfokus trauma','Terapi kejang listrik','Psikoanalisis klasik jangka sangat panjang','Terapi okupasi tunggal','Hipnoterapi rekreasional'],a:0,skdi:'3A',p:'<b>Benar:</b> terapi perilaku kognitif berfokus trauma termasuk teknik paparan adalah psikoterapi lini pertama PTSD. <b>Salah:</b> terapi kejang listrik untuk depresi berat refrakter; psikoanalisis klasik bukan lini pertama; terapi okupasi tunggal dan hipnoterapi rekreasional tidak adekuat. <b>Relevansi:</b> dasar rujukan dan tata laksana psikiatri.'},
{cat:'Psikiatri Trauma',n:'Trauma2 no.34,77',q:'Pilihan farmakoterapi jangka panjang yang relatif aman untuk gangguan stres pascatrauma adalah?',o:['Golongan SSRI seperti sertralin atau paroksetin','Benzodiazepin dosis tinggi jangka panjang','Antipsikotik tipikal dosis tinggi','Stimulan amfetamin','Barbiturat rutin'],a:0,skdi:'3A',p:'<b>Benar:</b> SSRI seperti sertralin dan paroksetin adalah farmakoterapi lini pertama PTSD dengan profil keamanan jangka panjang baik. <b>Salah:</b> benzodiazepin jangka panjang berisiko ketergantungan; antipsikotik tipikal dosis tinggi bukan lini pertama; stimulan dan barbiturat tidak diindikasikan. <b>Relevansi:</b> prinsip pemilihan obat psikiatri yang aman.'},
{cat:'Psikiatri Trauma',n:'Trauma2 no.23,28',q:'Kegawatan medis tersering pada anak usia 0 sampai 5 tahun yang sering dijumpai di layanan primer adalah?',o:['Kejang demam','Infark miokard','Stroke iskemik','Krisis hipertensi','Gout akut'],a:0,skdi:'4A',p:'<b>Benar:</b> kejang demam adalah kegawatan tersering pada balita dan menjadi kompetensi 4A dokter umum. <b>Salah:</b> infark miokard, stroke, krisis hipertensi, dan gout adalah penyakit dewasa dan jarang pada balita. <b>Relevansi:</b> penanganan kejang demam di layanan primer.'}
);

// ===================== KEGAWATAN, BIOETIK & UU =====================
QUIZ.push(
{cat:'Kegawatan, Bioetik & UU',n:'Trauma2 no.35,54 / Axon 20 no.10 / Aorta 19 no.1',q:'Hal mendasar yang membedakan pola pikir penanganan kasus kegawatdaruratan dibanding kasus elektif adalah?',o:['Penekanan pada assessment kegawatan dan prioritas ancaman nyawa','Penekanan pada riwayat penyakit keluarga lengkap','Penekanan pada pemeriksaan penunjang lengkap lebih dulu','Penekanan pada estetika hasil akhir','Penekanan pada efisiensi biaya terlebih dahulu'],a:0,skdi:'3B',p:'<b>Benar:</b> pendekatan gawat darurat menitikberatkan assessment cepat dan penanganan ancaman nyawa lebih dulu melalui survei primer ABCDE. <b>Salah:</b> riwayat keluarga lengkap, penunjang menyeluruh, estetika, dan efisiensi biaya adalah prioritas pada kasus elektif. <b>Relevansi:</b> prinsip time saving is life saving.'},
{cat:'Kegawatan, Bioetik & UU',n:'Trauma2 no.57 / Axon 20 no.36 / Aorta 19 no.24',q:'Pada wilayah yang jauh dari kota, jenis kasus kegawatdaruratan trauma yang sering dijumpai adalah?',o:['Luka akibat kekerasan dan luka tusuk','Infark miokard akut','Stroke trombolitik','Krisis tiroid','Ketoasidosis diabetik'],a:0,skdi:'3B',p:'<b>Benar:</b> di daerah terpencil, trauma akibat kekerasan dan luka tusuk menjadi kegawatan yang sering dihadapi dokter umum. <b>Salah:</b> infark, stroke trombolitik, krisis tiroid, dan ketoasidosis lebih terkait fasilitas dan penyakit kronik. <b>Relevansi:</b> kesiapan menangani trauma di fasilitas terbatas.'},
{cat:'Kegawatan, Bioetik & UU',n:'Anthelix 22 no.59 / Trauma2 no.104 / Axon 20 no.44',q:'Urutan pendekatan dasar pada bantuan hidup di layanan primer mengikuti algoritma?',o:['Danger, Response, Send for help, Airway, Breathing, Circulation, Defibrillation','Airway, Breathing, Circulation tanpa menilai bahaya lebih dulu','Circulation, Airway, Breathing, Danger','Breathing, Circulation, Defibrillation, Response','Response, Circulation, Breathing, Airway'],a:0,skdi:'4A',p:'<b>Benar:</b> algoritma DRSABCD dimulai menilai bahaya, respons, memanggil bantuan, lalu airway, breathing, circulation, dan defibrilasi. <b>Salah:</b> urutan lain mengabaikan penilaian bahaya atau membalik prioritas jalan napas dan sirkulasi. <b>Relevansi:</b> bantuan hidup dasar adalah kompetensi 4A.'},
{cat:'Kegawatan, Bioetik & UU',n:'Anthelix 22 no.11',q:'Pasien tidak sadar dengan suara mengorok dan dicurigai cedera servikal. Manuver pembebasan jalan napas yang paling tepat adalah?',o:['Jaw thrust','Head tilt chin lift maksimal','Hiperekstensi leher','Memiringkan kepala penuh','Fleksi leher ke dada'],a:0,skdi:'4A',p:'<b>Benar:</b> jaw thrust membebaskan jalan napas tanpa menggerakkan tulang servikal sehingga aman pada dugaan cedera leher. <b>Salah:</b> head tilt chin lift dan hiperekstensi menggerakkan servikal; memiringkan dan fleksi leher berisiko memperberat cedera. <b>Relevansi:</b> proteksi servikal saat membuka jalan napas.'},
{cat:'Kegawatan, Bioetik & UU',n:'Axon 20 no.68',q:'Langkah awal menilai respons korban yang ditemukan tergeletak adalah?',o:['Menepuk bahu dengan mantap sambil memanggil','Langsung memberi napas buatan','Langsung kompresi dada','Memberi minum','Mengangkat korban berdiri'],a:0,skdi:'4A',p:'<b>Benar:</b> penilaian respons dilakukan dengan menepuk bahu dengan mantap sambil memanggil korban sebelum tindakan lain. <b>Salah:</b> napas buatan dan kompresi dilakukan setelah menilai respons dan napas; memberi minum berbahaya pada penurunan kesadaran; mengangkat berdiri tidak aman. <b>Relevansi:</b> langkah awal bantuan hidup dasar.'},
{cat:'Kegawatan, Bioetik & UU',n:'Axon 20 no.63',q:'Korban dengan sesak berat, distensi vena leher, dan hipersonor pada satu sisi dada saat triase bencana diberi label warna?',o:['Merah','Kuning','Hijau','Hitam','Biru'],a:0,skdi:'3B',p:'<b>Benar:</b> kondisi mengancam nyawa namun masih dapat diselamatkan seperti tension pneumothorax mendapat label merah atau immediate. <b>Salah:</b> kuning untuk tertunda; hijau untuk minor; hitam untuk meninggal atau expectant; biru bukan kategori triase START. <b>Relevansi:</b> prinsip triase pada korban massal.'},
{cat:'Kegawatan, Bioetik & UU',n:'Axon 20 no.62 / Aorta 19 no.20',q:'Sesuai prinsip Murtagh, pada pasien dengan nyeri dada, diagnosis yang harus selalu dipikirkan dan disingkirkan lebih dulu adalah?',o:['Infark miokard akut','Refluks gastroesofageal','Nyeri otot dinding dada','Kecemasan','Costochondritis'],a:0,skdi:'3B',p:'<b>Benar:</b> prinsip Murtagh menuntut menyingkirkan diagnosis yang mengancam nyawa seperti infark miokard lebih dulu pada nyeri dada. <b>Salah:</b> refluks, nyeri otot, kecemasan, dan costochondritis adalah diagnosis yang lebih jinak dan disingkirkan setelahnya. <b>Relevansi:</b> safe diagnostic strategy di layanan primer.'},
{cat:'Kegawatan, Bioetik & UU',n:'Aorta 19 no.32',q:'Tanda bahaya utama yang menuntut dokter layanan primer segera bertindak pada pasien trauma adalah?',o:['Penurunan kesadaran','Nyeri ringan terlokalisir','Lecet superfisial','Memar kecil','Cemas ringan'],a:0,skdi:'3B',p:'<b>Benar:</b> penurunan kesadaran adalah red flag yang menandai ancaman jalan napas dan sirkulasi sehingga butuh tindakan segera. <b>Salah:</b> nyeri ringan, lecet, memar kecil, dan cemas ringan bukan tanda bahaya yang mengancam nyawa. <b>Relevansi:</b> pengenalan warning sign untuk eskalasi penanganan.'},
{cat:'Kegawatan, Bioetik & UU',n:'Axon 20 no.15',q:'Dokter lupa melepas torniket pada pasien sehingga terjadi kerusakan jaringan. Prinsip bioetik yang dilanggar adalah?',o:['Non-maleficence','Beneficence','Autonomy','Justice','Fidelity'],a:0,skdi:'— (bioetik)',p:'<b>Benar:</b> kelalaian yang menimbulkan bahaya pada pasien melanggar prinsip non-maleficence atau tidak merugikan. <b>Salah:</b> beneficence adalah berbuat baik; autonomy menghormati keputusan pasien; justice keadilan; fidelity kesetiaan pada komitmen. <b>Relevansi:</b> kaidah dasar bioetik kedokteran.'},
{cat:'Kegawatan, Bioetik & UU',n:'Aorta 19 no.49',q:'Korban kekerasan dalam rumah tangga datang dengan luka. Sikap dokter yang paling tepat secara etik dan hukum adalah?',o:['Menolong korban, memberi nasihat, dan memfasilitasi pelaporan sesuai keinginan korban','Mengabaikan karena masalah keluarga','Memaksa korban menuntut secara hukum','Menyebarkan kondisi korban kepada publik','Menolak memeriksa tanpa izin pelaku'],a:0,skdi:'— (bioetik dan hukum)',p:'<b>Benar:</b> dokter wajib menolong, mendokumentasikan, memberi nasihat, dan memfasilitasi pelaporan dengan menghormati otonomi dan kerahasiaan korban. <b>Salah:</b> mengabaikan, memaksa menuntut, menyebarkan kondisi, dan menolak memeriksa melanggar etik dan hukum. <b>Relevansi:</b> peran dokter pada kasus KDRT.'},
