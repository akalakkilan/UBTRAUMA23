{cat:'Kegawatan, Bioetik & UU',n:'Trauma2 no.4,20,80,102',q:'Hak pasien untuk mengakses isi rekam medis dirinya diatur dalam Undang-Undang Kesehatan Nomor 17 Tahun 2023 pada?',o:['Pasal 276','Pasal 1','Pasal 50','Pasal 100','Pasal 200'],a:0,skdi:'— (hukum kesehatan)',p:'<b>Benar:</b> hak pasien atas isi rekam medis diatur pada Pasal 276 UU Nomor 17 Tahun 2023 tentang Kesehatan. <b>Salah:</b> pasal lain yang disebut tidak mengatur hak akses rekam medis ini. <b>Relevansi:</b> dasar hukum penyelenggaraan rekam medis.'},
{cat:'Kegawatan, Bioetik & UU',n:'Trauma2 no.3,30',q:'Pasien yang merasa dirugikan akibat tindakan tenaga medis dapat mengajukan pengaduan dugaan pelanggaran disiplin kepada?',o:['Majelis yang menangani disiplin profesi tenaga medis','Kepolisian sebagai langkah pertama wajib','Dinas perhubungan','Kementerian keuangan','Lembaga sensor'],a:0,skdi:'— (hukum kesehatan)',p:'<b>Benar:</b> pengaduan dugaan pelanggaran disiplin profesi diajukan ke majelis disiplin profesi tenaga medis sesuai UU Nomor 17 Tahun 2023. <b>Salah:</b> kepolisian menangani ranah pidana bukan langkah disiplin pertama; instansi lain tidak berwenang menilai disiplin profesi. <b>Relevansi:</b> jalur penyelesaian sengketa medis.'}
);

// ===================== ADAB SAFAR =====================
QUIZ.push(
{cat:'Adab Safar',n:'Axon 20 no.9',q:'Hukum asal melakukan safar atau perjalanan adalah?',o:['Mubah','Wajib','Sunah muakkad','Makruh','Haram'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> hukum asal safar adalah mubah, dan dapat berubah sesuai tujuan menjadi wajib, sunah, makruh, atau haram. <b>Salah:</b> wajib, sunah muakkad, makruh, dan haram bukan hukum asal melainkan hukum yang bergantung niat dan tujuan. <b>Relevansi:</b> dasar memahami adab dan fikih safar.'},
{cat:'Adab Safar',n:'Anthelix 22 no.15,38,84',q:'Amalan yang dicontohkan Rasulullah ketika sampai di suatu negeri tujuan setelah safar adalah?',o:['Masuk masjid dan shalat dua rakaat lebih dulu','Langsung beristirahat tidur','Berbelanja terlebih dahulu','Mengadakan perayaan','Berkeliling melihat pasar'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> dicontohkan ketika tiba, beliau menuju masjid dan shalat dua rakaat sebagai bentuk syukur. <b>Salah:</b> langsung tidur, berbelanja, merayakan, dan berkeliling pasar bukan amalan yang dianjurkan saat pertama tiba. <b>Relevansi:</b> meneladani adab safar.'},
{cat:'Adab Safar',n:'Anthelix 22 no.69',q:'Amalan sunah yang dianjurkan dilakukan sebelum memulai safar untuk memohon kebaikan pilihan adalah?',o:['Shalat istikharah','Puasa wajib','Itikaf sebulan','Membayar fidyah','Menyembelih hewan'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> shalat istikharah dianjurkan sebelum safar untuk memohon petunjuk dalam mengambil keputusan. <b>Salah:</b> puasa wajib, itikaf sebulan, fidyah, dan menyembelih hewan tidak dikhususkan sebagai amalan sebelum safar. <b>Relevansi:</b> adab persiapan perjalanan.'},
{cat:'Adab Safar',n:'Axon 20 no.32',q:'Tidur sebentar di siang hari atau qailulah dianjurkan dengan tujuan?',o:['Menyelisihi kebiasaan setan dan menguatkan ibadah malam','Mengikuti tradisi semata','Menghindari pekerjaan','Memperpanjang waktu istirahat tanpa tujuan','Menggantikan tidur malam sepenuhnya'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> qailulah dianjurkan untuk menyelisihi setan dan membantu bangun beribadah di malam hari. <b>Salah:</b> sekadar tradisi, menghindari kerja, istirahat tanpa tujuan, dan menggantikan tidur malam bukan tujuan qailulah. <b>Relevansi:</b> adab menjaga kebugaran selama safar.'},
{cat:'Adab Safar',n:'Aorta 19 no.16',q:'Saat safar, jumlah rakaat shalat subuh yang dikerjakan adalah?',o:['Dua rakaat','Satu rakaat','Tiga rakaat','Empat rakaat','Lima rakaat'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> shalat subuh tetap dua rakaat karena subuh tidak dapat diqashar. <b>Salah:</b> jumlah selain dua rakaat tidak sesuai ketentuan shalat subuh baik saat mukim maupun safar. <b>Relevansi:</b> fikih shalat saat bepergian.'},
{cat:'Adab Safar',n:'Aorta 19 no.43',q:'Pasangan shalat yang boleh dijama saat safar adalah?',o:['Zuhur dengan ashar dan maghrib dengan isya','Subuh dengan zuhur','Ashar dengan maghrib','Maghrib dengan subuh','Isya dengan subuh'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> shalat yang boleh dijama adalah zuhur dengan ashar serta maghrib dengan isya. <b>Salah:</b> subuh tidak dapat dijama dengan shalat lain, demikian pula pasangan yang disebut lainnya. <b>Relevansi:</b> fikih jama saat safar.'},
{cat:'Adab Safar',n:'Axon 20 no.11',q:'Doa yang dianjurkan dibaca ketika singgah dan berhenti di suatu tempat saat safar bermakna?',o:['Memohon perlindungan dengan kalimat Allah yang sempurna dari keburukan makhluk','Memohon ditambah harta','Memohon dipercepat sampai tujuan','Memohon cuaca cerah','Memohon teman seperjalanan'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> doa singgah memohon perlindungan dengan kalimat Allah yang sempurna dari keburukan makhluk yang diciptakan. <b>Salah:</b> permohonan harta, kecepatan sampai, cuaca, dan teman bukan makna doa singgah yang diajarkan. <b>Relevansi:</b> adab dan doa selama perjalanan.'},
{cat:'Adab Safar',n:'Aorta 19 no.10',q:'Seorang pria melakukan safar bersama wanita yang belum dinikahinya untuk sesi foto pranikah. Hukum safar semacam ini adalah?',o:['Haram','Mubah','Sunah','Makruh ringan','Wajib'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> safar dengan ikhtilat dan khalwat bersama yang bukan mahram untuk tujuan pranikah hukumnya haram. <b>Salah:</b> mubah, sunah, makruh ringan, dan wajib tidak sesuai karena terdapat pelanggaran batas pergaulan. <b>Relevansi:</b> adab safar dan batasan pergaulan.'},
{cat:'Adab Safar',n:'Aorta 19 no.42',q:'Seseorang melakukan safar khusus menuju makam tertentu untuk berdoa agar hajatnya terkabul melalui perantara penghuni kubur. Hukum safar ini adalah?',o:['Haram','Mubah','Sunah muakkad','Wajib','Makruh ringan'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> safar khusus ke kubur untuk meminta dikabulkan hajat melalui penghuni kubur termasuk perbuatan terlarang sehingga hukumnya haram. <b>Salah:</b> mubah, sunah, wajib, dan makruh ringan tidak sesuai karena terdapat unsur penyimpangan akidah. <b>Relevansi:</b> adab safar dan menjaga kemurnian tauhid.'},
{cat:'Adab Safar',n:'Aorta 19 no.25',q:'Seorang muslimah berencana mendaki tujuh puncak dunia seorang diri tanpa mahram dalam perjalanan jauh berhari-hari. Hukum safar ini adalah?',o:['Haram','Mubah','Sunah','Wajib','Makruh ringan'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> safar jauh berhari-hari bagi muslimah tanpa mahram tidak dibenarkan sehingga hukumnya haram. <b>Salah:</b> mubah, sunah, wajib, dan makruh ringan tidak sesuai dengan ketentuan safar bagi perempuan tanpa mahram. <b>Relevansi:</b> adab dan syarat safar bagi muslimah.'},
{cat:'Adab Safar',n:'Aorta 19 no.56',q:'Ketika seorang musafir telah melihat negeri tujuan atau kampung halamannya, yang dianjurkan adalah?',o:['Mempercepat perjalanan dengan tetap menaati aturan keselamatan','Berhenti lama untuk berfoto','Memperlambat tanpa alasan','Mengabaikan rambu demi cepat sampai','Berputar arah dahulu'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> dianjurkan mempercepat perjalanan untuk segera sampai namun tetap menaati aturan dan keselamatan berkendara. <b>Salah:</b> berhenti lama, memperlambat tanpa alasan, mengabaikan rambu, dan berputar arah tidak sesuai anjuran. <b>Relevansi:</b> menyeimbangkan adab safar dengan keselamatan.'}
);
</script>
<script>
// ===================== SOAL TAMBAHAN DARI 5 FILE BARU (GABUNGAN) =====================
QUIZ.push(
// ---- Anatomi (Sebab-Akibat) ----
{cat:'Anatomi (Sebab-Akibat)',n:'Ascendens',q:'PERNYATAAN 1: Hepar sebagian besar terletak di regio hypochondriaca sinistra. SEBAB. PERNYATAAN 2: Hepar merupakan kelenjar terbesar dalam tubuh manusia.',o:['Pernyataan 1 benar, pernyataan 2 benar dan saling berhubungan','Pernyataan 1 benar, pernyataan 2 benar dan tidak saling berhubungan','Pernyataan 1 benar, pernyataan 2 salah','Pernyataan 1 salah, pernyataan 2 benar','Pernyataan 1 salah dan pernyataan 2 salah'],a:3,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Pernyataan 1 salah karena hepar sebagian besar menempati regio hypochondriaca DEXTRA dan epigastrium, bukan sinistra. Pernyataan 2 benar, hepar adalah kelenjar terbesar tubuh. <b>Salah:</b> opsi yang menyatakan pernyataan 1 benar keliru karena posisi hepar dominan di sisi kanan. <b>Relevansi:</b> orientasi regio abdomen menjadi dasar lokalisasi cedera organ pada trauma tumpul (PPT Anatomi Abdomen dr. Misbah).'},
{cat:'Anatomi (Sebab-Akibat)',n:'Ascendens',q:'PERNYATAAN 1: Sulcus arteriae meningeae mediae terdapat pada os frontale. SEBAB. PERNYATAAN 2: Arteria meningea media sering robek pada trauma capitis.',o:['Pernyataan 1 benar, pernyataan 2 benar dan saling berhubungan','Pernyataan 1 benar, pernyataan 2 benar dan tidak saling berhubungan','Pernyataan 1 benar, pernyataan 2 salah','Pernyataan 1 salah, pernyataan 2 benar','Pernyataan 1 salah dan pernyataan 2 salah'],a:3,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Pernyataan 1 salah karena sulcus arteriae meningeae mediae berada pada os temporale dan os parietale, bukan os frontale. Pernyataan 2 benar, arteri ini robek pada fraktur temporoparietal dan menyebabkan EDH. <b>Salah:</b> opsi yang menyatakan pernyataan 1 benar keliru. <b>Relevansi:</b> dasar memahami patofisiologi epidural hematoma pada cedera kepala (PPT Anatomi Klinis Kepala dr. Dodik).'},
{cat:'Anatomi (Sebab-Akibat)',n:'Ascendens',q:'PERNYATAAN 1: Articulatio coxae secara morfologis termasuk articulatio globoidea. SEBAB. PERNYATAAN 2: Secara fungsional articulatio coxae termasuk syndesmosis.',o:['Pernyataan 1 benar, pernyataan 2 benar dan saling berhubungan','Pernyataan 1 benar, pernyataan 2 benar dan tidak saling berhubungan','Pernyataan 1 benar, pernyataan 2 salah','Pernyataan 1 salah, pernyataan 2 benar','Pernyataan 1 salah dan pernyataan 2 salah'],a:2,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Pernyataan 1 benar, articulatio coxae adalah sendi peluru atau globoidea. Pernyataan 2 salah karena syndesmosis adalah sendi fibrosa tanpa rongga, sedangkan coxae adalah diarthrosis. <b>Salah:</b> opsi lain keliru menilai status pernyataan. <b>Relevansi:</b> klasifikasi sendi mendasari pemahaman dislokasi sendi panggul pada trauma (PPT Anatomi Ekstremitas dr. Dodik).'},
{cat:'Anatomi (Sebab-Akibat)',n:'Ascendens',q:'PERNYATAAN 1: Liquor cerebrospinalis berfungsi melindungi otak terhadap goncangan. SEBAB. PERNYATAAN 2: Liquor cerebrospinalis hanya terdapat pada tiga ventrikel otak.',o:['Pernyataan 1 benar, pernyataan 2 benar dan saling berhubungan','Pernyataan 1 benar, pernyataan 2 benar dan tidak saling berhubungan','Pernyataan 1 benar, pernyataan 2 salah','Pernyataan 1 salah, pernyataan 2 benar','Pernyataan 1 salah dan pernyataan 2 salah'],a:2,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Pernyataan 1 benar, LCS meredam goncangan mekanik otak. Pernyataan 2 salah karena LCS terdapat pada empat ventrikel yaitu dua ventrikel lateralis, ventrikel tertius, dan ventrikel quartus. <b>Salah:</b> opsi yang menilai pernyataan 2 benar keliru. <b>Relevansi:</b> pemahaman LCS penting pada cedera kepala dan kebocoran LCS basis cranii (PPT Cedera Kepala dr. Sulistyani).'},
{cat:'Anatomi (Sebab-Akibat)',n:'Ascendens',q:'PERNYATAAN 1: Gerakan ventriculus bersifat peristaltik. SEBAB. PERNYATAAN 2: Tunica muscularis ventriculus tersusun atas dua lapisan otot polos.',o:['Pernyataan 1 benar, pernyataan 2 benar dan saling berhubungan','Pernyataan 1 benar, pernyataan 2 benar dan tidak saling berhubungan','Pernyataan 1 benar, pernyataan 2 salah','Pernyataan 1 salah, pernyataan 2 benar','Pernyataan 1 salah dan pernyataan 2 salah'],a:2,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Pernyataan 1 benar, gerakan lambung bersifat peristaltik. Pernyataan 2 salah karena tunica muscularis ventriculus memiliki tiga lapisan yaitu oblique, sirkular, dan longitudinal. <b>Salah:</b> opsi yang menilai pernyataan 2 benar keliru. <b>Relevansi:</b> struktur lambung mendasari pemahaman perforasi gaster pada trauma abdomen (PPT Anatomi Abdomen dr. Misbah).'},
{cat:'Anatomi (Sebab-Akibat)',n:'Ascendens',q:'PERNYATAAN 1: Ganglion tidak memiliki badan sel saraf. SEBAB. PERNYATAAN 2: Ganglion hanya merupakan kumpulan serabut saraf.',o:['Pernyataan 1 benar, pernyataan 2 benar dan saling berhubungan','Pernyataan 1 benar, pernyataan 2 benar dan tidak saling berhubungan','Pernyataan 1 benar, pernyataan 2 salah','Pernyataan 1 salah, pernyataan 2 benar','Pernyataan 1 salah dan pernyataan 2 salah'],a:4,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Kedua pernyataan salah karena ganglion justru merupakan kumpulan badan sel saraf di luar sistem saraf pusat, bukan kumpulan serabut saja. <b>Salah:</b> opsi lain keliru menganggap salah satu pernyataan benar. <b>Relevansi:</b> dasar memahami cedera saraf tepi dan radiks dorsalis (PPT Peripheral Nerve Injuries dr. Sulistyani).'},
{cat:'Anatomi (Sebab-Akibat)',n:'Ascendens',q:'PERNYATAAN 1: Pada articulatio genus dapat terjadi gerakan flexi dan rotasi. SEBAB. PERNYATAAN 2: Rotasi pada articulatio genus berlangsung mengelilingi axis transversalis.',o:['Pernyataan 1 benar, pernyataan 2 benar dan saling berhubungan','Pernyataan 1 benar, pernyataan 2 benar dan tidak saling berhubungan','Pernyataan 1 benar, pernyataan 2 salah','Pernyataan 1 salah, pernyataan 2 benar','Pernyataan 1 salah dan pernyataan 2 salah'],a:2,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Pernyataan 1 benar, genu memungkinkan flexi-extensi dan rotasi terbatas saat flexi. Pernyataan 2 salah karena rotasi berlangsung mengelilingi axis vertikal atau longitudinal, sedangkan flexi mengelilingi axis transversalis. <b>Salah:</b> opsi yang menilai pernyataan 2 benar keliru. <b>Relevansi:</b> dasar memahami cedera ligamen dan meniskus lutut (PPT Anatomi Ekstremitas dr. Dodik).'},
{cat:'Anatomi (Sebab-Akibat)',n:'Ascendens',q:'PERNYATAAN 1: Bronchus primarius berjumlah sepasang. SEBAB. PERNYATAAN 2: Trachea bercabang dua setinggi vertebra thoracalis IV sampai V.',o:['Pernyataan 1 benar, pernyataan 2 benar dan saling berhubungan','Pernyataan 1 benar, pernyataan 2 benar dan tidak saling berhubungan','Pernyataan 1 benar, pernyataan 2 salah','Pernyataan 1 salah, pernyataan 2 benar','Pernyataan 1 salah dan pernyataan 2 salah'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Kedua pernyataan benar dan berhubungan karena bifurcatio tracheae setinggi vertebra thoracalis IV-V menghasilkan sepasang bronchus primarius. <b>Salah:</b> opsi lain keliru menilai status atau hubungan pernyataan. <b>Relevansi:</b> dasar memahami ruptur bronkus dan pneumomediastinum pada trauma thorax (PPT Anatomi Klinis Thorax dr. Dodik).'},
{cat:'Anatomi (Sebab-Akibat)',n:'Ascendens',q:'PERNYATAAN 1: Caput dan corpus pancreatis terletak retroperitoneal. SEBAB. PERNYATAAN 2: Cauda pancreatis terletak intraperitoneal di dalam ligamentum splenorenale.',o:['Pernyataan 1 benar, pernyataan 2 benar dan saling berhubungan','Pernyataan 1 benar, pernyataan 2 benar dan tidak saling berhubungan','Pernyataan 1 benar, pernyataan 2 salah','Pernyataan 1 salah, pernyataan 2 benar','Pernyataan 1 salah dan pernyataan 2 salah'],a:1,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Kedua pernyataan benar tetapi tidak saling menyebabkan, keduanya sekadar mendeskripsikan posisi bagian pankreas yang berbeda. <b>Salah:</b> opsi yang menyatakan saling berhubungan keliru karena tidak ada hubungan sebab-akibat. <b>Relevansi:</b> letak retroperitoneal pankreas menjelaskan gejala tersembunyi pada cedera pankreas (PPT Anatomi Abdomen dr. Misbah).'},
{cat:'Anatomi (Sebab-Akibat)',n:'Ascendens',q:'PERNYATAAN 1: Diaphragma merupakan septum fibromuscularis. SEBAB. PERNYATAAN 2: Pada bagian tengah diaphragma terdapat centrum tendineum.',o:['Pernyataan 1 benar, pernyataan 2 benar dan saling berhubungan','Pernyataan 1 benar, pernyataan 2 benar dan tidak saling berhubungan','Pernyataan 1 benar, pernyataan 2 salah','Pernyataan 1 salah, pernyataan 2 benar','Pernyataan 1 salah dan pernyataan 2 salah'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Kedua pernyataan benar dan berhubungan karena diafragma disebut septum fibromuscularis justru karena bagian tendinosanya yaitu centrum tendineum di tengah dan bagian muscularis di tepi. <b>Salah:</b> opsi lain keliru. <b>Relevansi:</b> dasar memahami ruptur diafragma dan herniasi viseral pasca trauma tumpul (PPT Anatomi Klinis Thorax dr. Dodik).'},
{cat:'Anatomi (Sebab-Akibat)',n:'Ascendens',q:'PERNYATAAN 1: Flexi adalah gerakan yang memperkecil sudut antara dua tulang yang bersendi. SEBAB. PERNYATAAN 2: Sendi adalah setiap bentuk persambungan antar tulang.',o:['Pernyataan 1 benar, pernyataan 2 benar dan saling berhubungan','Pernyataan 1 benar, pernyataan 2 benar dan tidak saling berhubungan','Pernyataan 1 benar, pernyataan 2 salah','Pernyataan 1 salah, pernyataan 2 benar','Pernyataan 1 salah dan pernyataan 2 salah'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Kedua pernyataan benar dan berhubungan karena gerakan flexi hanya dapat dipahami dalam konteks sendi sebagai persambungan tulang. <b>Salah:</b> opsi lain keliru menilai hubungan. <b>Relevansi:</b> terminologi gerak sendi mendasari penilaian range of motion pasca cedera muskuloskeletal (PPT Anatomi Ekstremitas dr. Dodik).'},
{cat:'Anatomi (Sebab-Akibat)',n:'Ascendens',q:'PERNYATAAN 1: Pars squamosa ossis temporalis merupakan bagian dari cranium. SEBAB. PERNYATAAN 2: Mandibula bersendi pada fossa mandibularis ossis temporalis.',o:['Pernyataan 1 benar, pernyataan 2 benar dan saling berhubungan','Pernyataan 1 benar, pernyataan 2 benar dan tidak saling berhubungan','Pernyataan 1 benar, pernyataan 2 salah','Pernyataan 1 salah, pernyataan 2 benar','Pernyataan 1 salah dan pernyataan 2 salah'],a:0,skdi:'— (anatomi dasar)',p:'<b>Benar:</b> Kedua pernyataan benar dan berhubungan karena fossa mandibularis sebagai tempat sendi temporomandibular memang berada pada os temporale yang menjadi bagian cranium. <b>Salah:</b> opsi lain keliru. <b>Relevansi:</b> dasar memahami fraktur dan dislokasi temporomandibular pada trauma maksilofasial (PPT Anatomi Klinis Kepala dr. Dodik).'},

// ---- Saraf Tepi ----
{cat:'Saraf Tepi',n:'Ascendens',q:'Seorang pria tertidur dengan lengan tertekuk di sandaran kursi semalaman, bangun dengan wrist drop dan kesulitan ekstensi pergelangan tangan. Saraf yang mengalami kompresi adalah?',o:['Nervus radialis','Nervus medianus','Nervus ulnaris','Nervus musculocutaneus','Nervus axillaris'],a:0,skdi:'3A',p:'<b>Benar:</b> Saturday night palsy disebabkan kompresi nervus radialis di sulcus spiralis humeri sehingga terjadi wrist drop. <b>Salah:</b> medianus menyebabkan ape hand, ulnaris menyebabkan claw hand, musculocutaneus mengganggu flexi siku, axillaris mengganggu abduksi bahu. <b>Relevansi:</b> dokter umum mengenali neuropati kompresi dan merujuk untuk tata laksana lanjut (PPT Peripheral Nerve Injuries dr. Sulistyani).'},
{cat:'Saraf Tepi',n:'Ascendens',q:'Mekanisme cedera saraf pada Saturday night palsy tersebut adalah?',o:['Kompresi','Traksi','Laserasi','Iskemia infark','Terbakar'],a:0,skdi:'3A',p:'<b>Benar:</b> mekanismenya adalah kompresi saraf akibat penekanan berkepanjangan. <b>Salah:</b> traksi terjadi pada cedera regang, laserasi pada luka tajam, iskemia infark pada gangguan vaskular, terbakar pada cedera termal. <b>Relevansi:</b> identifikasi mekanisme menentukan prognosis pemulihan neuropraksia (PPT Peripheral Nerve Injuries dr. Sulistyani).'},
{cat:'Saraf Tepi',n:'Ascendens',q:'Kelemahan flexi sendi interphalangeal distal jari keempat dan kelima disertai claw hand menunjukkan lesi pada?',o:['Nervus ulnaris','Nervus medianus','Nervus radialis','Nervus musculocutaneus','Nervus axillaris'],a:0,skdi:'3A',p:'<b>Benar:</b> nervus ulnaris mempersarafi musculus flexor digitorum profundus jari keempat-kelima dan otot intrinsik tangan sehingga lesinya menyebabkan claw hand. <b>Salah:</b> medianus untuk jari pertama-ketiga, radialis untuk ekstensor, musculocutaneus untuk flexor lengan atas, axillaris untuk deltoid. <b>Relevansi:</b> dokter umum melakukan pemeriksaan motorik-sensorik tangan untuk lokalisasi lesi (PPT Anatomi Manus dr. Misbah).'},
{cat:'Saraf Tepi',n:'Ascendens',q:'Atlet angkat beban mengeluh margo medialis dan angulus inferior scapula menonjol seperti sayap saat mendorong dinding. Saraf yang mengalami lesi adalah?',o:['Nervus thoracalis longus','Nervus axillaris','Nervus subscapularis','Nervus thoracodorsalis','Nervus suprascapularis'],a:0,skdi:'3A',p:'<b>Benar:</b> winged scapula terjadi akibat lesi nervus thoracalis longus yang melumpuhkan musculus serratus anterior. <b>Salah:</b> axillaris untuk deltoid, subscapularis dan thoracodorsalis untuk otot punggung lain, suprascapularis untuk supraspinatus-infraspinatus. <b>Relevansi:</b> dokter umum mengenali pola kelemahan otot bahu untuk rujukan tepat (PPT Peripheral Nerve Injuries dr. Sulistyani).'},
{cat:'Saraf Tepi',n:'Ascendens',q:'Cedera pada spatium quadrangulare humerus paling sering menjepit struktur berupa?',o:['Nervus axillaris','Nervus radialis','Nervus medianus','Arteria brachialis','Nervus musculocutaneus'],a:0,skdi:'3A',p:'<b>Benar:</b> quadrangular space syndrome menjepit nervus axillaris bersama arteria circumflexa humeri posterior sehingga deltoid melemah. <b>Salah:</b> radialis melintas di triangular interval, medianus dan brachialis di fossa cubiti, musculocutaneus menembus coracobrachialis. <b>Relevansi:</b> dasar memahami kelemahan abduksi bahu pasca trauma (PPT Anatomi Ekstremitas dr. Dodik).'},
{cat:'Saraf Tepi',n:'Ascendens',q:'Seorang pasien mengalami kelemahan asending simetris pada kedua tungkai beberapa minggu setelah diare. Jenis kerusakan saraf yang mendasari adalah?',o:['Demielinisasi','Axonotmesis','Neurotmesis','Degenerasi Wallerian','Neuropraksia'],a:0,skdi:'3B',p:'<b>Benar:</b> Sindrom Guillain-Barre adalah polineuropati demielinisasi inflamatorik akut pasca infeksi. <b>Salah:</b> axonotmesis, neurotmesis, dan degenerasi Wallerian terjadi pada cedera saraf mekanik, neuropraksia adalah blok konduksi fokal tanpa kerusakan akson. <b>Relevansi:</b> dokter umum mengenali gejala dini dan merujuk karena risiko gagal napas (PPT Peripheral Nerve Injuries dr. Sulistyani).'},
{cat:'Saraf Tepi',n:'Ascendens',q:'Tipe cedera saraf tepi dengan terputusnya seluruh akson dan selubung saraf serta prognosis pemulihan paling buruk adalah?',o:['Neurotmesis','Axonotmesis','Neuropraksia','Demielinisasi','Remielinisasi'],a:0,skdi:'— (materi cedera saraf)',p:'<b>Benar:</b> neurotmesis adalah pemutusan total akson dan jaringan ikat saraf sehingga prognosisnya paling buruk dan sering perlu operasi. <b>Salah:</b> axonotmesis masih mempertahankan endoneurium, neuropraksia hanya blok konduksi, demielinisasi dan remielinisasi adalah proses selubung mielin. <b>Relevansi:</b> klasifikasi Seddon menentukan keputusan rujuk bedah saraf (PPT Peripheral Nerve Injuries dr. Sulistyani).'},
{cat:'Saraf Tepi',n:'Ascendens',q:'Kecepatan regenerasi akson saraf tepi setelah cedera diperkirakan sebesar?',o:['1 mm per hari','1 cm per hari','1 mm per jam','1 cm per jam','10 mm per jam'],a:0,skdi:'— (materi cedera saraf)',p:'<b>Benar:</b> regenerasi akson berlangsung kira-kira 1 mm per hari sehingga pemulihan saraf panjang memerlukan waktu berbulan-bulan. <b>Salah:</b> nilai lain terlalu cepat dan tidak sesuai bukti fisiologi regenerasi saraf. <b>Relevansi:</b> dasar konseling waktu pemulihan kepada pasien cedera saraf tepi (PPT Peripheral Nerve Injuries dr. Sulistyani).'},
{cat:'Saraf Tepi',n:'Ascendens',q:'Cedera traksi pleksus brachialis bagian bawah radiks C8 sampai T1 menimbulkan kelumpuhan yang dikenal sebagai?',o:['Paralisis Klumpke','Paralisis Erb','Wrist drop','Saturday night palsy','Claw hand idiopatik'],a:0,skdi:'3A',p:'<b>Benar:</b> lesi radiks bawah pleksus brachialis menimbulkan paralisis Klumpke dengan kelumpuhan otot intrinsik tangan. <b>Salah:</b> paralisis Erb mengenai radiks atas C5-C6, wrist drop khas lesi radialis, Saturday night palsy adalah kompresi radialis, claw hand idiopatik bukan istilah baku. <b>Relevansi:</b> dokter umum mengenali pola lesi pleksus pada trauma tarikan bahu (PPT Anatomi Ekstremitas dr. Dodik).'},

// ---- Radiologi Trauma ----
{cat:'Radiologi Trauma',n:'Ascendens',q:'Untuk menilai dugaan fraktur pada tulang-tulang manus, proyeksi foto polos yang paling tepat diminta adalah?',o:['Antero-posterior dan lateral','Antero-posterior saja','Lateral saja','Antero-posterior dan Towne','Axial dan Towne'],a:0,skdi:'— (radiologi)',p:'<b>Benar:</b> evaluasi fraktur manus standar menggunakan proyeksi antero-posterior dan lateral, sering ditambah oblik bila perlu. <b>Salah:</b> satu proyeksi tunggal tidak memadai menilai pergeseran fragmen, proyeksi Towne khusus untuk occiput. <b>Relevansi:</b> dokter umum menentukan permintaan foto yang tepat sebelum merujuk (PPT Radiologi Traumatologi dr. Tinton).'},
{cat:'Radiologi Trauma',n:'Ascendens',q:'Untuk memperlihatkan os occipitale pada dugaan fraktur calvaria bagian belakang, posisi pemeriksaan radiologi yang dipilih adalah?',o:['Posisi Towne','Posisi Waters','Posisi Caldwell','Posisi Schuller','Posisi Submentovertex'],a:0,skdi:'— (radiologi)',p:'<b>Benar:</b> posisi Towne adalah proyeksi half-axial yang memperlihatkan os occipitale dan foramen magnum dengan baik. <b>Salah:</b> Waters untuk sinus dan wajah, Caldwell untuk frontal-ethmoid, Schuller untuk mastoid, submentovertex untuk basis cranii. <b>Relevansi:</b> dokter umum mengenali indikasi proyeksi kepala pada trauma (PPT Peranan Radiologi pada Traumatologi dr. Harsono).'},
{cat:'Radiologi Trauma',n:'Ascendens',q:'Untuk menilai fraktur pada tulang-tulang pedis, kombinasi proyeksi foto polos yang dianjurkan adalah?',o:['Antero-posterior dan oblik','Antero-posterior dan Towne','Lateral dan axial','Oblik dan Waters','Axial dan submentovertex'],a:0,skdi:'— (radiologi)',p:'<b>Benar:</b> evaluasi pedis menggunakan proyeksi antero-posterior dan oblik agar tulang-tulang tarsal dan metatarsal tidak saling bertumpuk. <b>Salah:</b> Towne, Waters, dan submentovertex adalah proyeksi kepala, sehingga tidak sesuai untuk pedis. <b>Relevansi:</b> dokter umum memilih proyeksi tepat untuk ekstremitas bawah (PPT Radiologi Traumatologi dr. Tinton).'},
{cat:'Radiologi Trauma',n:'Ascendens',q:'Seorang pejalan kaki tertabrak, foto thorax menunjukkan perselubungan homogen menutupi sinus costophrenicus kanan dengan meniscus sign. Interpretasi yang paling tepat adalah?',o:['Hematothorax dextra','Pneumothorax dextra','Pneumonia lobaris dextra','Atelektasis dextra','Kontusio paru dextra'],a:0,skdi:'3B',p:'<b>Benar:</b> perselubungan homogen dengan meniscus sign pada konteks trauma tumpul thorax menunjukkan efusi pleura hemoragik atau hematothorax dextra. <b>Salah:</b> pneumothorax tampak lusen avaskular, pneumonia memberi air bronchogram, atelektasis menarik struktur, kontusio berupa infiltrat patchy nonsegmental. <b>Relevansi:</b> dokter umum mengenali hematothorax untuk indikasi WSD dan rujukan (PPT Peranan Radiologi pada Traumatologi dr. Harsono).'},
{cat:'Radiologi Trauma',n:'Ascendens',q:'Pada foto thorax kasus trauma, gambaran yang paling penting dinilai untuk mengevaluasi keadaan sirkulasi mediastinum adalah?',o:['Letak dan ukuran bayangan aorta','Gambaran trabekula tulang','Posisi diafragma','Pola bronkovaskular perifer','Sudut costophrenicus'],a:0,skdi:'— (radiologi)',p:'<b>Benar:</b> pelebaran mediastinum dan perubahan kontur aorta menjadi penanda dugaan cedera aorta atau perdarahan mediastinum. <b>Salah:</b> trabekula tulang menilai fraktur, diafragma menilai ruptur diafragma, pola vaskular perifer menilai parenkim, sudut costophrenicus menilai efusi. <b>Relevansi:</b> dokter umum mengenali tanda bahaya mediastinum untuk rujukan segera (PPT Radiologi Traumatologi dr. Tinton).'},
{cat:'Radiologi Trauma',n:'Ascendens',q:'Pada MSCT abdomen dengan kontras, tampak laserasi subkapsular kurang dari sepuluh persen permukaan hepar tanpa perdarahan aktif. Derajat cedera hepar yang sesuai adalah?',o:['Derajat I','Derajat II','Derajat III','Derajat IV','Derajat V'],a:0,skdi:'3B',p:'<b>Benar:</b> hematoma subkapsular kurang dari sepuluh persen permukaan termasuk cedera hepar derajat I menurut skala AAST. <b>Salah:</b> derajat lebih tinggi menunjukkan laserasi lebih dalam, hematoma lebih luas, atau cedera vaskular. <b>Relevansi:</b> dokter umum memahami grading untuk keputusan observasi atau rujuk bedah (PPT Peranan Radiologi pada Traumatologi dr. Harsono).'},

// ---- Muskuloskeletal (tambahan) ----
{cat:'Muskuloskeletal',n:'Ascendens',q:'Seorang anak jatuh bertumpu pada tangan, foto menunjukkan fraktur inkomplit pada sepertiga distal radius dengan korteks satu sisi masih utuh. Jenis fraktur ini disebut?',o:['Fraktur greenstick','Fraktur Colles','Fraktur Smith','Fraktur Galeazzi','Fraktur Bennett'],a:0,skdi:'3B',p:'<b>Benar:</b> fraktur greenstick adalah fraktur inkomplit khas pada anak karena tulang masih lentur. <b>Salah:</b> Colles dan Smith adalah fraktur lengkap radius distal dewasa, Galeazzi melibatkan radius distal dengan dislokasi radioulnar, Bennett pada basis metacarpal pertama. <b>Relevansi:</b> dokter umum mengenali pola fraktur anak dan melakukan imobilisasi awal (PPT Manajemen Konservatif Trauma Ekstremitas dr. Hita).'},
{cat:'Muskuloskeletal',n:'Ascendens',q:'Foto antebrachii menunjukkan fraktur sepertiga proksimal ulna disertai dislokasi caput radii. Diagnosis fraktur ini adalah?',o:['Fraktur Monteggia','Fraktur Galeazzi','Fraktur olecranon','Fraktur supracondyler','Fraktur Bennett'],a:0,skdi:'3B',p:'<b>Benar:</b> fraktur Monteggia adalah fraktur sepertiga proksimal ulna disertai dislokasi caput radii. <b>Salah:</b> Galeazzi adalah fraktur radius distal dengan dislokasi radioulnar distal, olecranon dan supracondyler berbeda lokasi, Bennett pada metacarpal pertama. <b>Relevansi:</b> dokter umum mengenali fraktur-dislokasi untuk rujukan ortopedi segera (PPT Manajemen Konservatif Trauma Ekstremitas dr. Hita).'},
{cat:'Muskuloskeletal',n:'Ascendens',q:'Foto manus menunjukkan fraktur basis os metacarpal pertama yang masuk ke sendi disertai subluksasi carpometacarpal. Diagnosis fraktur ini adalah?',o:['Fraktur Bennett','Fraktur Smith','Fraktur Galeazzi','Fraktur Monteggia','Fraktur Colles'],a:0,skdi:'3B',p:'<b>Benar:</b> fraktur Bennett adalah fraktur dislokasi intraartikular pada basis metacarpal pertama. <b>Salah:</b> Smith dan Colles pada radius distal, Galeazzi dan Monteggia pada antebrachii. <b>Relevansi:</b> dokter umum mengenali cedera ibu jari untuk imobilisasi dan rujukan (PPT Anatomi Manus dr. Misbah).'},
{cat:'Muskuloskeletal',n:'Ascendens',q:'Seorang pelari cepat tiba-tiba nyeri tajam di pangkal paha medial saat akselerasi, dengan nyeri tekan kompartemen medial femur. Otot yang paling mungkin cedera adalah?',o:['Musculus adductor','Musculus rectus femoris','Musculus sartorius','Musculus vastus medialis','Musculus iliopsoas'],a:0,skdi:'3A',p:'<b>Benar:</b> groin pull pada sprinter umumnya adalah strain musculus adductor pada kompartemen medial paha. <b>Salah:</b> rectus femoris dan vastus medialis di kompartemen anterior, sartorius melintang superficial, iliopsoas adalah fleksor panggul dalam. <b>Relevansi:</b> dokter umum menata laksana cedera otot dengan RICE dan rehabilitasi (PPT Anatomi Ekstremitas dr. Dodik).'},
{cat:'Muskuloskeletal',n:'Ascendens',q:'Pada fraktur clavicula sepertiga lateral dengan elevasi fragmen medial, ligamen yang berperan menstabilkan clavicula terhadap scapula dan dapat ikut robek adalah?',o:['Ligamentum coracoclaviculare','Ligamentum sternoclaviculare','Ligamentum costoclaviculare','Ligamentum acromioclaviculare','Ligamentum transversum scapulae'],a:0,skdi:'3A',p:'<b>Benar:</b> ligamentum coracoclaviculare menstabilkan clavicula terhadap processus coracoideus dan robekannya menyebabkan instabilitas fragmen lateral. <b>Salah:</b> sternoclaviculare dan costoclaviculare di ujung medial, acromioclaviculare hanya stabilisasi sendi AC, transversum scapulae tidak terkait clavicula. <b>Relevansi:</b> dokter umum mengenali derajat cedera bahu untuk imobilisasi (PPT Anatomi Ekstremitas dr. Dodik).'},

// ---- Syok & Resusitasi (tambahan) ----
{cat:'Syok & Resusitasi',n:'Ascendens',q:'Jenis syok yang mekanisme dasarnya berkaitan dengan gangguan tonus dan dilatasi pembuluh darah perifer adalah?',o:['Syok distributif','Syok hipovolemik','Syok kardiogenik','Syok obstruktif','Syok hemoragik'],a:0,skdi:'3B',p:'<b>Benar:</b> syok distributif terjadi akibat vasodilatasi dan redistribusi volume seperti pada sepsis, anafilaksis, dan neurogenik. <b>Salah:</b> hipovolemik dan hemoragik karena kehilangan volume, kardiogenik karena kegagalan pompa, obstruktif karena hambatan aliran. <b>Relevansi:</b> dokter umum membedakan jenis syok untuk resusitasi awal yang tepat (PPT Syok dan Resusitasi Cairan dr. Febrian).'},
{cat:'Syok & Resusitasi',n:'Ascendens',q:'Jenis syok yang penanganannya menekankan penggunaan obat-obat inotropik dan kardiotonik adalah?',o:['Syok kardiogenik','Syok hipovolemik','Syok distributif','Syok anafilaktik','Syok neurogenik'],a:0,skdi:'3B',p:'<b>Benar:</b> syok kardiogenik akibat kegagalan pompa jantung ditangani dengan obat inotropik dan kardiotonik. <b>Salah:</b> hipovolemik membutuhkan cairan, distributif dan anafilaktik membutuhkan vasopresor dan pemicu spesifik, neurogenik membutuhkan vasopresor dan atropin. <b>Relevansi:</b> dokter umum melakukan stabilisasi awal sebelum rujuk ke fasilitas lebih tinggi (PPT Terapi Cairan Syok dr. Arifin).'},
{cat:'Syok & Resusitasi',n:'Ascendens',q:'Pasien luka bakar dewasa berat badan 50 kg dengan luas luka bakar 35 persen. Menurut rumus Baxter, jumlah cairan Ringer Laktat yang diberikan pada 8 jam pertama adalah?',o:['3500 mL','7000 mL','1750 mL','5250 mL','2625 mL'],a:0,skdi:'3B',p:'<b>Benar:</b> rumus Baxter 4 mL kali berat badan kali persen luka memberi total 7000 mL, separuhnya yaitu 3500 mL diberikan pada 8 jam pertama. <b>Salah:</b> 7000 mL adalah total 24 jam, nilai lain tidak sesuai perhitungan. <b>Relevansi:</b> dokter umum melakukan resusitasi cairan luka bakar fase awal sebelum rujukan (PPT Manajemen Luka Bakar dr. Hita).'},
{cat:'Syok & Resusitasi',n:'Ascendens',q:'Tindakan resusitasi cairan yang paling tepat pada pasien syok hemoragik di unit gawat darurat adalah?',o:['Pasang dua jalur intravena kanula ukuran besar','Pasang satu jalur intravena kanula ukuran kecil','Pasang jalur intraarterial','Pasang akses vena sentral terlebih dahulu','Tunggu hasil golongan darah sebelum infus'],a:0,skdi:'3B',p:'<b>Benar:</b> resusitasi syok hemoragik diawali dua jalur intravena perifer kanula besar untuk pemberian cairan cepat. <b>Salah:</b> kanula kecil dan satu jalur memperlambat resusitasi, jalur arteri bukan untuk cairan, vena sentral tidak diprioritaskan di awal, menunda infus berbahaya. <b>Relevansi:</b> dokter umum menguasai akses dan resusitasi cairan awal (PPT Syok Hemorrhage dr. Fauzi).'},

// ---- Thoraks (tambahan) ----
{cat:'Thoraks',n:'Ascendens',q:'Secara anatomis pneumothorax traumatik terjadi akibat adanya robekan pada?',o:['Pleura viseralis dan alveoli','Pleura parietalis dan alveoli','Pleura parietalis dan pleura viseralis','Pleura viseralis dan musculus intercostalis','Pleura parietalis dan musculus intercostalis'],a:0,skdi:'3B',p:'<b>Benar:</b> udara masuk ke rongga pleura karena robekan pleura viseralis dan alveoli paru. <b>Salah:</b> kombinasi lain tidak menjelaskan jalur masuk udara dari paru ke rongga pleura. <b>Relevansi:</b> dokter umum memahami mekanisme pneumothorax untuk indikasi dekompresi dan WSD (PPT Tatalaksana Trauma Thorax dr. Hita).'},
{cat:'Thoraks',n:'Ascendens',q:'Penyebab tersering emfisema subkutis disertai pneumomediastinum pada trauma tumpul dada hebat adalah?',o:['Ruptur bronkus','Fraktur costae tunggal','Robekan pleura parietalis','Kontusio miokard','Ruptur diafragma'],a:0,skdi:'3B',p:'<b>Benar:</b> ruptur bronkus memungkinkan udara masuk ke mediastinum dan jaringan subkutis menimbulkan emfisema subkutis luas. <b>Salah:</b> fraktur costae tunggal dan robekan pleura parietalis jarang menimbulkan pneumomediastinum masif, kontusio miokard dan ruptur diafragma bermanifestasi berbeda. <b>Relevansi:</b> dokter umum mengenali tanda bahaya cedera jalan napas besar untuk rujukan segera (PPT Tatalaksana Trauma Thorax dr. Hita).'},
{cat:'Thoraks',n:'Ascendens',q:'Salah satu kriteria pencabutan selang water sealed drainage pada pasien hematopneumothorax yang membaik adalah?',o:['Produksi cairan kurang dari 100 cc per 24 jam dan suara paru kanan sama dengan kiri','Produksi cairan lebih dari 300 cc per 24 jam','Masih terdapat undulasi aktif dan bubble','Suara paru kanan lebih lemah daripada kiri','Foto thorax masih menunjukkan perselubungan luas'],a:0,skdi:'3B',p:'<b>Benar:</b> WSD dapat dilepas bila produksi cairan minimal dan serous, paru mengembang penuh, serta suara napas simetris. <b>Salah:</b> produksi tinggi, undulasi-bubble aktif, asimetri suara, dan perselubungan luas menandakan belum siap. <b>Relevansi:</b> dokter umum memahami prinsip pemantauan WSD pasca pemasangan (PPT Tatalaksana Trauma Thorax dr. Hita).'},

// ---- Kepala & Medula Spinalis (tambahan) ----
{cat:'Kepala & Medula Spinalis',n:'Ascendens',q:'Dosis pemberian manitol untuk menurunkan tekanan intrakranial pada cedera kepala adalah?',o:['Manitol 20 persen 0,5 sampai 1 gram per kilogram berat badan dalam 30 menit','Manitol 5 persen 0,1 gram per kilogram berat badan bolus cepat','Manitol 40 persen 2 gram per kilogram berat badan dalam 5 menit','Manitol 10 persen 0,05 gram per kilogram berat badan per oral','Manitol 20 persen 5 gram per kilogram berat badan dalam 24 jam'],a:0,skdi:'3B',p:'<b>Benar:</b> manitol 20 persen 0,5 sampai 1 gram per kilogram berat badan diberikan selama 30 menit sebagai terapi osmotik penurun tekanan intrakranial. <b>Salah:</b> dosis dan konsentrasi lain tidak sesuai pedoman dan berisiko. <b>Relevansi:</b> dokter umum memberikan terapi awal hipertensi intrakranial sebelum rujukan bedah saraf (PPT Cedera Kepala dan Medula Spinalis dr. Sulistyani).'},
{cat:'Kepala & Medula Spinalis',n:'Ascendens',q:'Pasien trauma kepala mengeluarkan cairan bening dari telinga disertai hematom retroauricular. Lokasi fraktur yang paling mungkin adalah?',o:['Fraktur basis cranii fossa media','Fraktur basis cranii fossa anterior','Fraktur basis cranii fossa posterior','Fraktur calvaria regio frontalis','Fraktur os nasale'],a:0,skdi:'3B',p:'<b>Benar:</b> otorea LCS dan Battle sign menandakan fraktur basis cranii fossa media yang melibatkan os temporale. <b>Salah:</b> fossa anterior memberi rinorea dan raccoon eyes, fossa posterior jarang otorea, fraktur calvaria frontal dan os nasale tidak menimbulkan otorea. <b>Relevansi:</b> dokter umum mengenali tanda fraktur basis cranii untuk tata laksana dan rujukan (PPT Cedera Kepala dan Medula Spinalis dr. Sulistyani).'},
{cat:'Kepala & Medula Spinalis',n:'Ascendens',q:'Luka tembus pada satu sisi medula spinalis menimbulkan kelemahan motorik ipsilateral dengan hilangnya sensasi nyeri dan suhu kontralateral. Sindrom yang terjadi adalah?',o:['Sindrom Brown-Sequard','Sindrom medula anterior','Sindrom medula posterior','Sindrom medula sentral','Transeksi medula komplit'],a:0,skdi:'3B',p:'<b>Benar:</b> hemiseksi medula menimbulkan sindrom Brown-Sequard dengan defisit motorik dan proprioseptif ipsilateral serta defisit nyeri-suhu kontralateral. <b>Salah:</b> sindrom anterior, posterior, sentral, dan transeksi komplit memberi pola defisit berbeda. <b>Relevansi:</b> dokter umum mengenali sindrom medula untuk imobilisasi dan rujukan tepat (PPT Cedera Kepala dan Medula Spinalis dr. Sulistyani).'},
{cat:'Kepala & Medula Spinalis',n:'Ascendens',q:'Hiperekstensi leher pada lansia menimbulkan kelemahan ekstremitas atas lebih berat daripada bawah tanpa fraktur jelas. Sindrom medula yang sesuai adalah?',o:['Sindrom medula sentral','Sindrom medula anterior','Sindrom medula posterior','Sindrom Brown-Sequard','Sindrom kauda equina'],a:0,skdi:'3B',p:'<b>Benar:</b> central cord syndrome khas pada hiperekstensi lansia dengan kelemahan lengan lebih berat daripada tungkai. <b>Salah:</b> sindrom anterior dan posterior memberi defisit jaras spesifik, Brown-Sequard bersifat hemiseksi, kauda equina mengenai radiks lumbosakral. <b>Relevansi:</b> dokter umum mengenali pola defisit untuk kewaspadaan cedera servikal (PPT Cedera Kepala dan Medula Spinalis dr. Sulistyani).'},

// ---- Abdomen & Urogenital (tambahan) ----
{cat:'Abdomen & Urogenital',n:'Ascendens',q:'Korban penusukan dengan belati masih tertancap di abdomen datang ke puskesmas. Tindakan yang paling tepat dilakukan adalah?',o:['Merujuk ke rumah sakit dengan belati tetap menancap','Mencabut belati lalu menjahit luka primer','Mencabut belati lalu mengeksplorasi luka','Mencabut belati dan menyerahkan kepada polisi','Mencabut belati lalu menutup luka dan memulangkan pasien'],a:0,skdi:'3B',p:'<b>Benar:</b> benda tertancap tidak boleh dicabut di fasilitas terbatas karena dapat memicu perdarahan masif, pasien dirujuk dengan benda difiksasi di tempat. <b>Salah:</b> mencabut benda berisiko perdarahan tidak terkontrol dan memperberat cedera. <b>Relevansi:</b> dokter umum menstabilkan dan merujuk kasus penetrasi abdomen (PPT Prinsip Dasar Penanganan Trauma dr. Hita).'},
{cat:'Abdomen & Urogenital',n:'Ascendens',q:'Pengemudi mengerem mendadak lalu mengeluh nyeri suprapubik, tidak bisa berkemih, tanpa massa suprapubik, disertai tes pekak beralih positif. Diagnosis yang paling mungkin adalah?',o:['Ruptur buli intraperitoneal','Retensi urin akut','Ruptur uretra anterior','Kontusio ginjal','Ileus paralitik'],a:0,skdi:'3B',p:'<b>Benar:</b> ruptur buli intraperitoneal menumpahkan urin ke rongga peritoneum sehingga tidak teraba massa dan timbul tanda cairan bebas berupa pekak beralih. <b>Salah:</b> retensi memberi buli penuh teraba, ruptur uretra anterior memberi darah di meatus, kontusio ginjal memberi hematuria nyeri pinggang, ileus berbeda mekanisme. <b>Relevansi:</b> dokter umum mengenali cedera buli untuk rujukan urologi (PPT Trauma Pelvis dan Sistem Kemih dr. Hita).'},
{cat:'Abdomen & Urogenital',n:'Ascendens',q:'Pasien trauma tumpul abdomen di rumah sakit tipe D dengan hemodinamik stabil. Pemeriksaan penunjang awal yang paling sesuai untuk menilai cairan bebas adalah?',o:['Ultrasonografi abdomen','Foto polos abdomen tiga posisi','CT scan abdomen kontras','Magnetic resonance imaging','Arteriografi selektif'],a:0,skdi:'3B',p:'<b>Benar:</b> ultrasonografi metode FAST cepat dan tersedia untuk mendeteksi cairan bebas pada trauma abdomen di fasilitas terbatas. <b>Salah:</b> foto polos kurang sensitif untuk cairan, CT dan MRI sering tidak tersedia di tipe D, arteriografi bukan modalitas awal. <b>Relevansi:</b> dokter umum memilih penunjang sesuai ketersediaan fasilitas (PPT Peranan Radiologi pada Traumatologi dr. Harsono).'},

// ---- Luka & Luka Bakar (tambahan) ----
{cat:'Luka & Luka Bakar',n:'Ascendens',q:'Luka bakar akibat aliran listrik tegangan tinggi yang juga mengandung komponen panas dikategorikan sebagai?',o:['Exogenous burn','Joule burn','Surface burn','Linier burn','Endogenous burn'],a:0,skdi:'3B',p:'<b>Benar:</b> luka bakar listrik tegangan tinggi yang disertai panas eksternal disebut exogenous burn. <b>Salah:</b> joule burn atau endogenous burn akibat panas internal pada titik kontak, surface burn dan linier burn bukan klasifikasi baku luka bakar listrik. <b>Relevansi:</b> dokter umum mengenali jenis luka bakar listrik untuk antisipasi cedera dalam (PPT Trauma Fisika dan Kimia dr. Busyra).'},
{cat:'Luka & Luka Bakar',n:'Ascendens',q:'Metode debridement luka yang paling cepat dan efektif untuk membuang jaringan nekrotik luas adalah?',o:['Debridement surgical','Debridement mekanik','Debridement enzimatik','Debridement autolitik','Debridement biologik'],a:0,skdi:'4A',p:'<b>Benar:</b> surgical debridement adalah cara tercepat dan paling efektif mengangkat jaringan mati luas. <b>Salah:</b> mekanik kurang selektif, enzimatik dan autolitik lambat, biologik dengan larva untuk kasus khusus. <b>Relevansi:</b> dokter umum melakukan debridement luka sederhana sesuai kompetensi 4A (PPT Managemen Luka dr. Hita).'},
{cat:'Luka & Luka Bakar',n:'Ascendens',q:'Untuk mencegah atrofi otot selama tungkai diimobilisasi dengan gips, jenis latihan yang dianjurkan adalah?',o:['Latihan isometrik','Latihan isotonik konsentrik','Latihan isotonik eksentrik','Latihan pliometrik','Latihan rentang gerak pasif penuh'],a:0,skdi:'— (rehabilitasi)',p:'<b>Benar:</b> latihan isometrik mengontraksikan otot tanpa menggerakkan sendi sehingga aman selama imobilisasi gips dan mencegah disuse atrophy. <b>Salah:</b> isotonik, pliometrik, dan rentang gerak penuh menggerakkan sendi yang sedang difiksasi. <b>Relevansi:</b> dokter umum memberi edukasi rehabilitasi selama imobilisasi (PPT Manajemen Konservatif Trauma Ekstremitas dr. Hita).'},

// ---- Farmakologi Trauma (tambahan) ----
{cat:'Farmakologi Trauma',n:'Ascendens',q:'Mekanisme kerja ethamsylate sebagai hemostatik adalah?',o:['Meningkatkan adhesivitas trombosit','Menghambat aktivasi plasminogen','Menggantikan faktor VIII','Menghambat tripsin','Menurunkan agregasi trombosit'],a:0,skdi:'— (farmakologi)',p:'<b>Benar:</b> ethamsylate bekerja meningkatkan adhesi trombosit dan memperbaiki resistensi kapiler. <b>Salah:</b> penghambatan plasminogen adalah asam traneksamat, faktor VIII untuk hemofilia A, penghambat tripsin adalah aprotinin, penurunan agregasi justru kontraproduktif. <b>Relevansi:</b> dokter umum memahami pilihan obat hemostatik pada perdarahan trauma (PPT Pemilihan Obat pada Trauma Prof. EM).'},
{cat:'Farmakologi Trauma',n:'Ascendens',q:'Mekanisme kerja aprotinin sebagai agen antifibrinolitik adalah?',o:['Menghambat tripsin dan plasmin','Menghambat protrombin','Mengaktifkan tromboplastin','Mengaktifkan faktor stuart','Menghambat vitamin K'],a:0,skdi:'— (farmakologi)',p:'<b>Benar:</b> aprotinin adalah inhibitor protease serin yang menghambat tripsin dan plasmin sehingga bersifat antifibrinolitik. <b>Salah:</b> mekanisme lain tidak menggambarkan kerja aprotinin. <b>Relevansi:</b> dokter umum memahami farmakologi obat hemostatik perioperatif (PPT Pemilihan Obat pada Trauma Prof. EM).'},
{cat:'Farmakologi Trauma',n:'Ascendens',q:'Pasien trauma dengan nyeri ringan dan riwayat tukak lambung memerlukan analgetik yang relatif aman terhadap mukosa lambung. Pilihan yang paling sesuai adalah?',o:['Celecoxib','Asam mefenamat','Natrium diklofenak','Piroksikam','Ketoprofen'],a:0,skdi:'4A',p:'<b>Benar:</b> celecoxib sebagai penghambat selektif COX-2 lebih aman terhadap mukosa lambung. <b>Salah:</b> asam mefenamat, diklofenak, piroksikam, dan ketoprofen adalah penghambat COX nonselektif yang berisiko iritasi lambung. <b>Relevansi:</b> dokter umum memilih analgetik sesuai komorbid pasien (PPT Pemilihan Obat pada Trauma Prof. EM).'},

// ---- Forensik (tambahan) ----
{cat:'Forensik',n:'Ascendens',q:'Pada fase asfiksia ketika tampak pupil dilatasi, tekanan darah turun, dan paralisis pusat pernapasan, korban berada pada fase?',o:['Fase apnea','Fase dispnea','Fase konvulsi','Fase inspirasi dalam','Fase pemulihan'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> fase apnea ditandai depresi pusat napas, pupil dilatasi, dan penurunan tekanan darah menjelang kematian. <b>Salah:</b> fase dispnea berupa sesak meningkat, fase konvulsi berupa kejang, fase inspirasi dalam mendahului henti napas, fase pemulihan bukan urutan asfiksia fatal. <b>Relevansi:</b> dokter umum memahami patofisiologi asfiksia pada kasus forensik (PPT Asfiksia dan Trauma dr. Hari).'},
{cat:'Forensik',n:'Ascendens',q:'Pada manual strangulation, salah satu tanda asfiksia yang ditemukan pada pemeriksaan jenazah adalah?',o:['Edema pulmo positif','Lebam mayat memudar permanen','Kaku mayat menghilang dini','Pembendungan vena leher negatif','Bercak Tardieu negatif'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> asfiksia menimbulkan edema pulmo dan tanda kongesti seperti bintik perdarahan. <b>Salah:</b> opsi lain justru meniadakan tanda asfiksia yang seharusnya positif. <b>Relevansi:</b> dokter umum mengenali tanda kekerasan pada leher untuk pelaporan medikolegal (PPT Forensik Traumatologi dr. Hari).'},
{cat:'Forensik',n:'Ascendens',q:'Pemeriksaan diatom pada jenazah yang sudah membusuk untuk memastikan tenggelam dilakukan dengan metode?',o:['Destruction test','Getah paru langsung','Tes apung paru','Pemeriksaan elektrolit darah','Pemeriksaan berat jenis darah'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> destruction test menghancurkan jaringan paru atau sumsum tulang untuk mengidentifikasi diatom pada jenazah membusuk. <b>Salah:</b> getah paru dan tes apung paru terbatas pada jenazah segar, pemeriksaan elektrolit dan berat jenis darah untuk dugaan tenggelam air tawar atau asin. <b>Relevansi:</b> dokter umum memahami prinsip pemeriksaan tenggelam untuk forensik (PPT Asfiksia dan Trauma dr. Hari).'},
{cat:'Forensik',n:'Ascendens',q:'Tanda khas luka bakar pada korban yang tersambar petir berupa gambaran percabangan seperti ranting di kulit disebut?',o:['Filigree burn','Joule burn','Electric mark','Pugilistic attitude','Heat stiffening'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> filigree atau arborescent burn adalah gambaran percabangan kemerahan di kulit khas sambaran petir. <b>Salah:</b> joule burn dan electric mark pada listrik kontak, pugilistic attitude dan heat stiffening akibat panas terbakar. <b>Relevansi:</b> dokter umum mengenali pola cedera untuk dugaan penyebab kematian (PPT Trauma Fisika dan Kimia dr. Busyra).'},

// ---- Psikiatri Trauma (tambahan) ----
{cat:'Psikiatri Trauma',n:'Ascendens',q:'Pada pasien acute stress disorder dengan gejala hyperarousal menonjol, obat yang dapat digunakan untuk meredakan gejala otonom adalah?',o:['Propranolol','Trifluoperazine','Triheksifenidil','Chlorpromazine','Difenhidramin'],a:0,skdi:'3A',p:'<b>Benar:</b> propranolol sebagai penyekat beta meredakan gejala hyperarousal otonom seperti palpitasi dan tremor. <b>Salah:</b> trifluoperazine dan chlorpromazine adalah antipsikotik, triheksifenidil antikolinergik, difenhidramin antihistamin. <b>Relevansi:</b> dokter umum memberi tata laksana awal stres akut dan merujuk bila perlu (PPT Penanganan Psikis Efek Trauma dr. Erna).'},
{cat:'Psikiatri Trauma',n:'Ascendens',q:'Pasien post traumatic stress disorder memerlukan terapi pemeliharaan jangka panjang. Golongan obat lini pertama yang dipilih adalah?',o:['Antidepresan golongan SSRI','Antipsikotik generasi pertama','Benzodiazepin kerja panjang','Antikonvulsan golongan barbiturat','Stimulan susunan saraf pusat'],a:0,skdi:'3A',p:'<b>Benar:</b> SSRI seperti sertralin dan paroksetin adalah lini pertama pemeliharaan PTSD. <b>Salah:</b> antipsikotik hanya adjuvan, benzodiazepin berisiko ketergantungan dan tidak untuk jangka panjang, barbiturat dan stimulan tidak diindikasikan. <b>Relevansi:</b> dokter umum mengenali pilihan farmakoterapi PTSD untuk kolaborasi rujukan (PPT Penanganan Psikis Efek Trauma dr. Erna).'},
{cat:'Psikiatri Trauma',n:'Ascendens',q:'Obat ansiolitik yang sebaiknya tidak diberikan lebih dari dua minggu karena risiko ketergantungan adalah?',o:['Diazepam','Fluoksetin','Sertralin','Buspiron','Propranolol'],a:0,skdi:'3A',p:'<b>Benar:</b> benzodiazepin seperti diazepam berisiko toleransi dan ketergantungan sehingga penggunaannya dibatasi singkat. <b>Salah:</b> fluoksetin dan sertralin adalah SSRI tidak menimbulkan ketergantungan, buspiron ansiolitik nonadiktif, propranolol penyekat beta. <b>Relevansi:</b> dokter umum meresepkan ansiolitik secara rasional dan aman (PPT Penanganan Psikis Efek Trauma dr. Erna).'},

// ---- Kegawatan, Bioetik & UU (tambahan) ----
{cat:'Kegawatan, Bioetik & UU',n:'Ascendens',q:'Cara menilai respons korban yang ditemukan tergeletak pada bantuan hidup dasar adalah?',o:['Menggoyangkan bahu dengan mantap sambil memanggil','Meraba nadi karotis selama 10 detik','Melakukan head tilt chin lift segera','Memberikan dua kali napas bantuan','Memasang posisi mantap miring'],a:0,skdi:'4A',p:'<b>Benar:</b> penilaian respons dilakukan dengan menggoyangkan bahu mantap sambil memanggil sesuai pendekatan AVPU. <b>Salah:</b> raba nadi dan napas bantuan adalah langkah berikutnya, head tilt untuk membuka jalan napas, posisi mantap untuk korban tidak sadar yang bernapas. <b>Relevansi:</b> dokter umum menguasai algoritma bantuan hidup dasar 4A (PPT Prinsip Dasar Penanganan Trauma dr. Hita).'},
{cat:'Kegawatan, Bioetik & UU',n:'Ascendens',q:'Indikasi pemasangan jalan napas definitif berupa intubasi endotrakeal pada pasien trauma adalah?',o:['Glasgow coma scale kurang dari 9','Glasgow coma scale 13 dengan napas spontan','Saturasi oksigen 98 persen tanpa alat','Pasien sadar penuh dan kooperatif','Frekuensi napas 16 kali per menit'],a:0,skdi:'3B',p:'<b>Benar:</b> GCS kurang dari 9 menandakan ketidakmampuan melindungi jalan napas sehingga diperlukan intubasi endotrakeal. <b>Salah:</b> kondisi lain menunjukkan jalan napas dan oksigenasi yang masih adekuat. <b>Relevansi:</b> dokter umum mengenali indikasi airway definitif dalam primary survey (PPT Prinsip Dasar Penanganan Trauma dr. Hita).'},
{cat:'Kegawatan, Bioetik & UU',n:'Ascendens',q:'Pada tahap exposure primary survey pasien trauma, manuver untuk memeriksa punggung tanpa membahayakan tulang belakang adalah?',o:['Log roll','Head tilt chin lift','Jaw thrust','Posisi recovery','Manuver Heimlich'],a:0,skdi:'3B',p:'<b>Benar:</b> log roll memungkinkan inspeksi punggung sambil mempertahankan kesegarisan tulang belakang. <b>Salah:</b> head tilt dan jaw thrust untuk jalan napas, posisi recovery untuk korban tidak sadar bernapas, Heimlich untuk obstruksi benda asing. <b>Relevansi:</b> dokter umum melakukan pemeriksaan menyeluruh dengan proteksi spinal (PPT Prinsip Dasar Penanganan Trauma dr. Hita).'},

// ---- Keislaman & Takdir ----
{cat:'Keislaman & Takdir',n:'Ascendens',q:'Seorang mahasiswa bercita-cita menjadi profesor lalu belajar tekun hingga cita-citanya tercapai. Hal ini termasuk contoh?',o:['Takdir muallaq','Takdir mubram','Qadha mutlak','Lauhul mahfudz','Sunnatullah kauniyah'],a:0,skdi:'— (keislaman)',p:'<b>Benar:</b> takdir muallaq adalah ketetapan yang dapat berubah melalui usaha dan ikhtiar manusia. <b>Salah:</b> takdir mubram tidak dapat diubah, qadha mutlak dan lauhul mahfudz menunjuk pencatatan ketetapan, sunnatullah kauniyah adalah hukum alam. <b>Relevansi:</b> menyeimbangkan ikhtiar medis dan tawakal dalam menghadapi penyakit (PPT Qadar dan Takdir Allah dr. N Juni).'},
{cat:'Keislaman & Takdir',n:'Ascendens',q:'Ayat yang menegaskan bahwa Allah tidak akan mengubah keadaan suatu kaum sebelum mereka mengubah keadaan diri mereka sendiri terdapat dalam?',o:['QS Ar Rad ayat 11','QS An Nisa ayat 78','QS Al Hadiid ayat 22','QS Al Jumuah ayat 10','QS Al Baqarah ayat 155'],a:0,skdi:'— (keislaman)',p:'<b>Benar:</b> QS Ar Rad ayat 11 menjadi landasan pentingnya usaha dalam mengubah keadaan dan mendasari konsep takdir muallaq. <b>Salah:</b> ayat lain membahas tema takdir, bencana, etos kerja, dan kesabaran yang berbeda. <b>Relevansi:</b> menguatkan motivasi ikhtiar dalam upaya penyembuhan (PPT Qadar dan Takdir Allah dr. N Juni).'},
{cat:'Keislaman & Takdir',n:'Ascendens',q:'Ayat yang menyatakan bahwa tiada suatu bencana pun yang menimpa di bumi dan pada diri kalian melainkan telah tertulis dalam kitab sebelum Kami menciptakannya terdapat dalam?',o:['QS Al Hadiid ayat 22','QS Ar Rad ayat 11','QS Al Baqarah ayat 155','QS Al Jumuah ayat 10','QS An Nisa ayat 79'],a:0,skdi:'— (keislaman)',p:'<b>Benar:</b> QS Al Hadiid ayat 22 menegaskan bahwa segala musibah telah tertulis di lauhul mahfudz, dasar takdir mubram. <b>Salah:</b> ayat lain membahas perubahan nasib, kesabaran, dan etos kerja. <b>Relevansi:</b> menumbuhkan penerimaan dan tawakal saat menghadapi musibah atau penyakit (PPT Qadar dan Takdir Allah dr. N Juni).'},
{cat:'Keislaman & Takdir',n:'Ascendens',q:'Ayat yang menjadi landasan perintah bekerja dan menuntut ilmu setelah menunaikan kewajiban ibadah terdapat dalam?',o:['QS Al Jumuah ayat 10','QS Al Hadiid ayat 22','QS Ar Rad ayat 11','QS Al Baqarah ayat 155','QS An Nisa ayat 78'],a:0,skdi:'— (keislaman)',p:'<b>Benar:</b> QS Al Jumuah ayat 10 memerintahkan bertebaran di muka bumi mencari karunia Allah setelah shalat, dasar etos kerja dan menuntut ilmu. <b>Salah:</b> ayat lain bertema takdir, musibah, dan kesabaran. <b>Relevansi:</b> mendorong semangat belajar dan profesionalisme tenaga kesehatan (PPT Qadar dan Takdir Allah dr. N Juni).'},
{cat:'Keislaman & Takdir',n:'Ascendens',q:'Fungsi utama beriman kepada qadha dan qadar Allah dalam menghadapi musibah adalah?',o:['Menumbuhkan sikap sabar dan tawakal','Menumbuhkan kesedihan berkepanjangan','Membenarkan sikap pasrah tanpa usaha','Menyalahkan takdir atas kegagalan','Menumbuhkan kesombongan atas keberhasilan'],a:0,skdi:'— (keislaman)',p:'<b>Benar:</b> iman kepada qadha dan qadar menumbuhkan kesabaran, tawakal, dan ketenangan jiwa tanpa meninggalkan ikhtiar. <b>Salah:</b> kesedihan berlebihan, pasrah tanpa usaha, menyalahkan takdir, dan kesombongan bertentangan dengan makna keimanan. <b>Relevansi:</b> mendukung ketahanan psikologis pasien dan tenaga medis (PPT Qadar dan Takdir Allah dr. N Juni).'},

// ---- Adab Safar (tambahan) ----
{cat:'Adab Safar',n:'Ascendens',q:'Menurut tuntunan, hari yang paling diutamakan Rasulullah untuk memulai safar adalah?',o:['Hari Kamis','Hari Senin','Hari Selasa','Hari Rabu','Hari Sabtu'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> Rasulullah sering memulai safar pada hari Kamis sebagaimana riwayat yang masyhur. <b>Salah:</b> hari lain tidak disebut sebagai hari yang diutamakan untuk memulai safar. <b>Relevansi:</b> mengamalkan adab safar dalam perjalanan termasuk perjalanan dinas tenaga kesehatan (PPT Adab Safar dr. Safari).'},
{cat:'Adab Safar',n:'Ascendens',q:'Ketika bepergian dalam rombongan, hal yang dianjurkan untuk dilakukan adalah?',o:['Mengangkat salah seorang sebagai ketua rombongan','Berjalan sendiri-sendiri tanpa koordinasi','Tidak menetapkan pemimpin agar bebas','Mengganti pemimpin setiap jam','Menyerahkan keputusan kepada yang termuda'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> disunahkan mengangkat seorang amir atau ketua rombongan agar perjalanan tertib dan terkoordinasi. <b>Salah:</b> tanpa pemimpin atau pemimpin yang berganti-ganti menimbulkan kekacauan, menyerahkan kepada termuda bukan tuntunan. <b>Relevansi:</b> prinsip kepemimpinan dan koordinasi relevan dalam tim medis dan evakuasi (PPT Adab Safar dr. Safari).'},
{cat:'Adab Safar',n:'Ascendens',q:'Seorang muslimah yang belum pernah berhaji hendak melaksanakan haji dengan ditemani saudara laki-laki kandungnya. Hukum safar haji baginya adalah?',o:['Wajib','Makruh','Haram','Mubah','Sunnah'],a:0,skdi:'— (materi adab safar)',p:'<b>Benar:</b> haji bagi yang mampu adalah wajib, dan safar muslimah bersama mahram seperti saudara laki-laki kandung dibolehkan sehingga ibadahnya wajib ditunaikan. <b>Salah:</b> makruh, haram, mubah, dan sunnah tidak sesuai karena syarat mahram telah terpenuhi. <b>Relevansi:</b> memahami syarat safar syari dalam konteks ibadah dan keselamatan (PPT Adab Safar dr. Safari).'}
);
</script>
<script>
// ===================== SOAL TAMBAHAN DARI BANK ARTHRON 18 =====================
QUIZ.push(
// ---- Radiologi Trauma ----
{cat:'Radiologi Trauma',n:'Arthron 18',q:'Pada foto polos pelvis korban kecelakaan tampak pelebaran celah simfisis pubis akibat robekan ligamentum simfisis. Kelainan yang tampak adalah?',o:['Diastasis simfisis pubis','Subluksasi articulatio coxae kanan','Subluksasi articulatio coxae kiri','Fraktur ramus pubis','Tidak tampak kelainan'],a:0,skdi:'— (radiologi)',p:'<b>Benar:</b> pelebaran celah simfisis pubis akibat robekan ligamen menggambarkan diastasis simfisis pubis. <b>Salah:</b> subluksasi coxae menunjukkan pergeseran caput femoris, fraktur ramus pubis berupa diskontinuitas tulang, dan tidak tampak kelainan jelas keliru. <b>Relevansi:</b> dokter umum mengenali cedera cincin pelvis untuk kewaspadaan perdarahan dan rujukan (PPT Radiologi Traumatologi dr. Tinton).'},
{cat:'Radiologi Trauma',n:'Arthron 18',q:'Pasien kecelakaan dengan nyeri rahang menjalani MSCT kepala 3D, tampak garis fraktur pada bagian rahang yang bersendi di fossa mandibularis. Kelainan yang tampak adalah?',o:['Fraktur condylus mandibularis','Fraktur processus coronoideus mandibularis','Fraktur angulus mandibularis','Fraktur corpus mandibula','Fraktur maxilla'],a:0,skdi:'— (radiologi)',p:'<b>Benar:</b> bagian mandibula yang bersendi pada fossa mandibularis adalah condylus, sehingga fraktur pada area tersebut adalah fraktur condylus mandibularis. <b>Salah:</b> processus coronoideus, angulus, corpus, dan maxilla berada di lokasi berbeda. <b>Relevansi:</b> dokter umum mengenali fraktur maksilofasial untuk rujukan bedah mulut atau bedah plastik (PPT Radiologi Traumatologi dr. Tinton).'},
{cat:'Radiologi Trauma',n:'Arthron 18',q:'Pasien hematuria pasca trauma abdomen menjalani MSCT abdomen kontras potongan coronal, tampak diskontinuitas parenkim disertai ekstravasasi pada ginjal sisi kiri. Kelainan yang tampak adalah?',o:['Ruptur ginjal kiri','Ruptur ginjal kanan','Hidronefrosis','Batu ginjal kanan','Ruptur vesica urinaria'],a:0,skdi:'3B',p:'<b>Benar:</b> diskontinuitas parenkim dengan ekstravasasi kontras pada ginjal kiri menunjukkan ruptur ginjal kiri. <b>Salah:</b> ruptur ginjal kanan salah sisi, hidronefrosis dan batu ginjal bukan gambaran ruptur, ruptur vesica urinaria berlokasi di buli. <b>Relevansi:</b> dokter umum mengenali cedera ginjal untuk rujukan urologi (PPT Peranan Radiologi pada Traumatologi dr. Harsono).'},
{cat:'Radiologi Trauma',n:'Arthron 18',q:'Pasien sesak setelah dada terbentur dashboard mobil, foto thorax menunjukkan segmen iga yang melayang disertai konsolidasi homogen nonsegmental pada parenkim paru kanan. Interpretasi yang paling tepat adalah?',o:['Flail chest kanan disertai kontusio pulmonum kanan','Efusi pleura kanan','Fraktur costae kanan tanpa komplikasi','Bronchopneumonia kanan','Massa paru kanan'],a:0,skdi:'3B',p:'<b>Benar:</b> segmen iga melayang menandakan flail chest dan konsolidasi nonsegmental menandakan kontusio pulmonum pada paru kanan. <b>Salah:</b> efusi memberi perselubungan dengan meniscus sign, fraktur costae tanpa komplikasi tidak menjelaskan konsolidasi, bronchopneumonia berpola berbeda, massa berbatas tegas. <b>Relevansi:</b> dokter umum mengenali kombinasi cedera dinding dada dan parenkim untuk penanganan ventilasi (PPT Radiologi Traumatologi dr. Tinton).'},

// ---- Kepala & Medula Spinalis ----
{cat:'Kepala & Medula Spinalis',n:'Arthron 18',q:'Seorang anak terjatuh dari ayunan dan kepala terbentur lantai. Secara biomekanika, jenis trauma kepala yang terjadi saat kepala yang bergerak tiba-tiba berhenti karena membentur lantai adalah?',o:['Deselerasi','Akselerasi','Rotasi','Akselerasi dan deselerasi','Tidak dapat ditentukan'],a:0,skdi:'3A',p:'<b>Benar:</b> kepala yang bergerak lalu mendadak berhenti karena membentur benda diam mengalami trauma deselerasi. <b>Salah:</b> akselerasi terjadi saat kepala diam dihantam benda bergerak, rotasi pada gerakan memutar, kombinasi dan tidak dapat ditentukan tidak sesuai mekanisme spesifik ini. <b>Relevansi:</b> dokter umum memahami biomekanika cedera kepala anak untuk menilai risiko (PPT Trauma Kepala pada Anak dr. Shinta).'},
{cat:'Kepala & Medula Spinalis',n:'Arthron 18',q:'Tahap patogenesis diffuse axonal injury yang terjadi akibat regangan akson saat akselerasi-deselerasi kepala adalah?',o:['Axonal stretching','Kalium influx','Natrium influx','Aktivasi sitoskeleton','Transport axoplasma normal'],a:0,skdi:'— (cedera kepala)',p:'<b>Benar:</b> mekanisme awal DAI adalah axonal stretching akibat gaya regangan pada substansia alba. <b>Salah:</b> influks ion dan aktivasi protease adalah tahap sekunder, sedangkan transport axoplasma justru terganggu pada DAI. <b>Relevansi:</b> dokter umum memahami patofisiologi DAI untuk menjelaskan prognosis cedera kepala difus (PPT Cedera Kepala dan Medula Spinalis dr. Sulistyani).'},
{cat:'Kepala & Medula Spinalis',n:'Arthron 18',q:'Bayi baru lahir dengan riwayat ekstraksi vakum, teraba benjolan di kepala yang lunak, berfluktuasi, berbatas tegas pada tepi tulang tengkorak, dan tidak menyeberang sutura. Diagnosis yang paling tepat adalah?',o:['Sefal hematom','Kaput suksedaneum','Subgaleal hematom','Perdarahan ekstradural','Hematoma epidural'],a:0,skdi:'3A',p:'<b>Benar:</b> benjolan berfluktuasi, berbatas tegas, dan tidak melewati sutura adalah ciri sefal hematom yang terbatas pada satu tulang tengkorak. <b>Salah:</b> kaput suksedaneum tidak berbatas tegas dan menyeberang sutura, subgaleal hematom luas, perdarahan ekstradural dan epidural bersifat intrakranial. <b>Relevansi:</b> dokter umum membedakan trauma lahir kepala untuk edukasi dan observasi (PPT Trauma Kepala pada Anak dr. Shinta).'},
{cat:'Kepala & Medula Spinalis',n:'Arthron 18',q:'Bayi baru lahir dengan persalinan sulit, teraba benjolan di kepala yang lunak, tidak berfluktuasi, tidak berbatas tegas, dan menyeberang sutura. Diagnosis yang paling tepat adalah?',o:['Kaput suksedaneum','Sefal hematom','Subgaleal hematom','Perdarahan ekstradural','Hematoma epidural'],a:0,skdi:'3A',p:'<b>Benar:</b> benjolan lunak tidak berbatas tegas yang menyeberang sutura adalah kaput suksedaneum berupa edema subkutis. <b>Salah:</b> sefal hematom berfluktuasi dan tidak melewati sutura, subgaleal lebih luas dan dapat menimbulkan syok, perdarahan ekstradural dan epidural intrakranial. <b>Relevansi:</b> dokter umum mengenali trauma lahir untuk edukasi orang tua bahwa kaput suksedaneum hilang dalam beberapa hari (PPT Trauma Kepala pada Anak dr. Shinta).'},

// ---- Thoraks ----
{cat:'Thoraks',n:'Arthron 18',q:'Pernyataan yang paling tepat menggambarkan mekanisme open pneumothorax adalah?',o:['Paru kolaps karena jaringan paru bersifat elastis dan tidak ada tekanan negatif yang menyedotnya','Vena cava terlipat sehingga darah tidak kembali ke jantung','Udara terdorong ke jaringan lunak melalui luka dan naik ke wajah','Udara tidak dapat keluar saat ekspirasi karena luka bersifat katup tertutup','Tekanan rongga pleura terus meningkat karena inspirasi paksa'],a:0,skdi:'3B',p:'<b>Benar:</b> pada open pneumothorax udara masuk bebas melalui luka dinding dada sehingga tekanan negatif intrapleura hilang dan paru yang elastis kolaps. <b>Salah:</b> opsi lain menggambarkan tension pneumothorax atau emfisema subkutis, bukan open pneumothorax. <b>Relevansi:</b> dokter umum memahami mekanisme untuk penutupan luka tiga sisi dan rujukan (PPT Tatalaksana Trauma Thorax dr. Hita).'},
{cat:'Thoraks',n:'Arthron 18',q:'Pada efusi pleura dextra yang memerlukan pemasangan water sealed drainage, lokasi insersi selang yang paling tepat adalah?',o:['Linea axillaris anterior SIC V','Linea axillaris anterior SIC II','Linea axillaris anterior SIC IX','Linea axillaris anterior SIC XI','Linea axillaris anterior SIC XII'],a:0,skdi:'3B',p:'<b>Benar:</b> WSD dipasang pada safe triangle setinggi sela iga kelima linea axillaris anterior. <b>Salah:</b> SIC II midclavicula untuk dekompresi jarum, sedangkan SIC IX hingga XII terlalu rendah dan berisiko melukai organ abdomen. <b>Relevansi:</b> dokter umum memahami lokasi pemasangan WSD yang aman (PPT Tatalaksana Trauma Thorax dr. Hita).'},

// ---- Syok & Resusitasi ----
{cat:'Syok & Resusitasi',n:'Arthron 18',q:'Trias kematian atau lethal triad yang menjadi penyebab tingginya mortalitas pada syok perdarahan terdiri atas?',o:['Koagulopati, hipotermia, dan asidosis','Hipotermia, hipovolemia, dan asidosis','Koagulopati, hipoalbumin, dan alkalosis','Koagulopati, hipertermia, dan asidosis','Hipoalbumin, hiperemesis, dan alkalosis'],a:0,skdi:'3B',p:'<b>Benar:</b> lethal triad terdiri atas koagulopati, hipotermia, dan asidosis yang saling memperberat pada syok perdarahan. <b>Salah:</b> kombinasi lain memuat komponen yang bukan bagian dari trias kematian. <b>Relevansi:</b> dokter umum memahami trias ini untuk resusitasi yang mencegah perburukan (PPT Syok Hemorrhage dr. Fauzi).'},
{cat:'Syok & Resusitasi',n:'Arthron 18',q:'Pasien pasca laparotomi memiliki hasil analisa gas darah pH 7,1, PaCO2 40 mmHg, dan HCO3 18 mEq per liter. Interpretasi yang tepat adalah?',o:['Asidosis metabolik tidak terkompensasi','Asidosis respiratorik terkompensasi penuh','Asidosis metabolik terkompensasi sebagian','Asidosis respiratorik tidak terkompensasi','Alkalosis respiratorik tidak terkompensasi'],a:0,skdi:'3B',p:'<b>Benar:</b> pH rendah dengan HCO3 rendah dan PaCO2 normal menunjukkan asidosis metabolik yang belum dikompensasi oleh sistem respirasi. <b>Salah:</b> komponen respiratorik normal sehingga bukan asidosis respiratorik, dan tidak ada tanda kompensasi maupun alkalosis. <b>Relevansi:</b> dokter umum menginterpretasi gangguan asam basa pada pasien kritis pasca trauma (PPT Terapi Cairan Syok dr. Arifin).'},

// ---- Abdomen & Urogenital ----
{cat:'Abdomen & Urogenital',n:'Arthron 18',q:'Pada pasien trauma tumpul abdomen kiri atas, mengangkat tungkai saat berbaring menimbulkan nyeri alih ke bahu kiri. Penyebab terjadinya nyeri alih tersebut adalah?',o:['Iritasi peritoneum karena perdarahan','Ruptur pankreas','Ruptur organ retroperitoneal','Inflamasi generalisata setelah trauma','Volvulus intestinal'],a:0,skdi:'3B',p:'<b>Benar:</b> tanda Kehr berupa nyeri alih ke bahu kiri timbul karena darah di rongga peritoneum mengiritasi diafragma yang dipersarafi nervus phrenicus. <b>Salah:</b> ruptur pankreas dan organ retroperitoneal tidak khas menimbulkan tanda Kehr, inflamasi generalisata dan volvulus berbeda mekanisme. <b>Relevansi:</b> dokter umum mengenali tanda perdarahan intraabdomen ec ruptur lien (PPT Anatomi Abdomen dr. Misbah).'},

// ---- Luka & Luka Bakar ----
{cat:'Luka & Luka Bakar',n:'Arthron 18',q:'Luka kronis menggaung yang basah, mengeluarkan pus, dengan jaringan nekrotik menghitam, menurut klasifikasi luka pembedahan termasuk kelas?',o:['Luka bedah kelas IV','Luka bedah kelas I','Luka bedah kelas II','Luka bedah kelas III','Luka bedah kelas V'],a:0,skdi:'4A',p:'<b>Benar:</b> luka dengan pus dan jaringan nekrotik terinfeksi termasuk luka kotor atau terinfeksi yaitu kelas IV. <b>Salah:</b> kelas I bersih, kelas II bersih terkontaminasi, kelas III terkontaminasi, sedangkan kelas V bukan klasifikasi baku. <b>Relevansi:</b> dokter umum mengklasifikasikan luka untuk keputusan penutupan dan antibiotik (PPT Jenis Luka dan Penyembuhan dr. Hita).'},
{cat:'Luka & Luka Bakar',n:'Arthron 18',q:'Seorang pasien empat bulan lalu mengalami luka bakar derajat II pada lengan bawah hingga tangan. Masalah yang paling mungkin timbul pada fase lanjut adalah?',o:['Kontraktur','Inflamasi dan infeksi','Hipermetabolisme','Hipovolemik syok','Gangguan elektrolit'],a:0,skdi:'3B',p:'<b>Benar:</b> komplikasi fase lanjut luka bakar berupa jaringan parut yang menarik sendi sehingga timbul kontraktur. <b>Salah:</b> inflamasi-infeksi dan hipermetabolisme adalah masalah fase subakut, sedangkan hipovolemik syok dan gangguan elektrolit adalah fase akut. <b>Relevansi:</b> dokter umum mengenali komplikasi lanjut untuk rujukan rehabilitasi dan bedah (PPT Manajemen Luka Bakar dr. Hita).'},
{cat:'Luka & Luka Bakar',n:'Arthron 18',q:'Pasien dirawat di bangsal setelah luka bakar listrik pada tangan. Komplikasi yang harus diwaspadai akibat kerusakan otot pada luka bakar listrik adalah?',o:['Nekrosis tubuler akut','Inflamasi dan infeksi','Gangguan elektrolit ringan','Hipermetabolisme','Hipovolemik syok'],a:0,skdi:'3B',p:'<b>Benar:</b> luka bakar listrik menimbulkan rabdomiolisis sehingga mioglobinuria dapat menyebabkan nekrosis tubuler akut. <b>Salah:</b> inflamasi-infeksi, gangguan elektrolit ringan, hipermetabolisme, dan hipovolemik syok bukan komplikasi spesifik kerusakan otot listrik ini. <b>Relevansi:</b> dokter umum mewaspadai gagal ginjal akut pada cedera listrik (PPT Trauma Fisika dan Kimia dr. Busyra).'},

// ---- Farmakologi Trauma ----
{cat:'Farmakologi Trauma',n:'Arthron 18',q:'Seorang anak dengan hemofilia B mengalami perdarahan yang sulit berhenti pasca penjahitan luka. Koagulan yang tepat diberikan adalah?',o:['Kompleks faktor IX','Faktor VIII','Carbazochrome','Asam traneksamat','Ethamsylate'],a:0,skdi:'3A',p:'<b>Benar:</b> hemofilia B disebabkan defisiensi faktor IX sehingga terapinya adalah kompleks faktor IX. <b>Salah:</b> faktor VIII untuk hemofilia A, carbazochrome dan ethamsylate bekerja pada kapiler-trombosit, asam traneksamat antifibrinolitik. <b>Relevansi:</b> dokter umum mengenali tata laksana awal gangguan koagulasi herediter (PPT Pemilihan Obat pada Trauma Prof. EM).'},
{cat:'Farmakologi Trauma',n:'Arthron 18',q:'Salah satu kontraindikasi pemberian asam traneksamat pada pasien trauma adalah?',o:['Penyakit thromboembolik','Gastritis','Benign prostatic hyperplasia','Insufisiensi hepar','Hepatitis'],a:0,skdi:'— (farmakologi)',p:'<b>Benar:</b> asam traneksamat bersifat antifibrinolitik sehingga kontraindikasi pada penyakit thromboembolik karena meningkatkan risiko trombosis. <b>Salah:</b> gastritis, BPH, insufisiensi hepar, dan hepatitis bukan kontraindikasi utama obat ini. <b>Relevansi:</b> dokter umum meresepkan antifibrinolitik secara aman sesuai komorbid (PPT Pemilihan Obat pada Trauma Prof. EM).'},

// ---- Forensik ----
{cat:'Forensik',n:'Arthron 18',q:'Seorang korban meninggal saat memperbaiki stop kontak, sempat bernapas lalu meninggal. Proses penyebab kematian utama pada trauma listrik tersebut adalah?',o:['Fibrilasi ventrikel','Mati kaku','Mati lemas','Pugilistic attitude','Edema paru'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> kematian akibat trauma listrik terutama disebabkan fibrilasi ventrikel karena arus melintasi jantung. <b>Salah:</b> mati kaku dan pugilistic attitude adalah tanda pada jenazah terbakar, mati lemas pada asfiksia, edema paru tanda nonspesifik. <b>Relevansi:</b> dokter umum memahami patofisiologi kematian listrik untuk pemeriksaan forensik (PPT Trauma Fisika dan Kimia dr. Busyra).'},
{cat:'Forensik',n:'Arthron 18',q:'Latar belakang yang paling banyak ditemukan pada kasus trauma listrik adalah?',o:['Kecelakaan','Bunuh diri','Pembunuhan','Hukuman','Kesengajaan magis'],a:0,skdi:'— (forensik)',p:'<b>Benar:</b> sebagian besar trauma listrik terjadi karena kecelakaan, terutama saat bekerja dengan instalasi listrik. <b>Salah:</b> bunuh diri, pembunuhan, dan hukuman dengan listrik jarang, kesengajaan magis bukan kategori medikolegal. <b>Relevansi:</b> dokter umum memahami epidemiologi untuk analisis manner of death (PPT Forensik Traumatologi dr. Hari).'},

// ---- Kegawatan, Bioetik & UU ----
{cat:'Kegawatan, Bioetik & UU',n:'Arthron 18',q:'Tindakan dokter yang menimbulkan Cushing syndrome akibat penggunaan steroid berlebihan dalam pengobatan pasien melanggar kaidah bioetik?',o:['Non-maleficence','Beneficence','Autonomy','Justice','Confidentiality'],a:0,skdi:'— (bioetik)',p:'<b>Benar:</b> menimbulkan bahaya akibat terapi yang tidak hati-hati melanggar non-maleficence yaitu kewajiban tidak merugikan pasien. <b>Salah:</b> beneficence justru berbuat baik, autonomy soal hak pasien, justice soal keadilan, confidentiality soal kerahasiaan. <b>Relevansi:</b> dokter umum menerapkan kaidah dasar bioetik dalam praktik (PPT Bioetik dr. Siti).'},
